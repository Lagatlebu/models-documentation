<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#3b6ef0">
<meta name="description" content="Document and refine your personal trading models, concepts and rules">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Trading KB">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152.png">
<link rel="apple-touch-icon" sizes="144x144" href="icons/icon-144.png">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">
<title>Trading KB</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f6f8;
  --card:#ffffff;
  --card2:#f0f2f6;
  --border:rgba(15,23,42,.08);
  --border-md:rgba(15,23,42,.14);
  --text:#0f1729;
  --text2:#4b5675;
  --text3:#9aa3b8;
  --blue:#3b6ef0;
  --blue-lt:rgba(59,110,240,.09);
  --blue-bd:rgba(59,110,240,.3);
  --green:#16a06a;
  --green-lt:rgba(22,160,106,.09);
  --red:#dc3f3f;
  --red-lt:rgba(220,63,63,.09);
  --sans:'Inter',-apple-system,sans-serif;
  --sh0:0 1px 3px rgba(15,23,42,.06);
  --sh1:0 4px 12px rgba(15,23,42,.08),0 1px 3px rgba(15,23,42,.05);
  --sh2:0 8px 24px rgba(15,23,42,.1),0 2px 6px rgba(15,23,42,.06);
  --sh3:0 20px 48px rgba(15,23,42,.14),0 4px 12px rgba(15,23,42,.07);
  --r:8px;--r2:12px;--r3:16px;
}
html,body{height:100%;overflow:hidden;font-family:var(--sans);background:var(--bg);color:var(--text);font-size:14px;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent}

/* ── LAYOUT ── */
.app{display:flex;height:100vh;overflow:hidden}

/* ── RAIL ── */
.rail{width:62px;flex-shrink:0;background:var(--card);border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center;padding:14px 0 12px;gap:2px;z-index:20;box-shadow:var(--sh0)}
.rail-logo{width:34px;height:34px;border-radius:10px;background:linear-gradient(145deg,#3b6ef0,#2146c2);display:flex;align-items:center;justify-content:center;margin-bottom:18px;box-shadow:0 4px 14px rgba(59,110,240,.38)}
.rail-logo svg{width:17px;height:17px;stroke:#fff;fill:none;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round}
.rail-btn{width:42px;height:42px;border-radius:11px;border:none;background:transparent;color:var(--text3);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;transition:all .15s;position:relative}
.rail-btn svg{width:19px;height:19px;stroke:currentColor;fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
.rail-btn span{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;line-height:1}
.rail-btn:hover{background:var(--bg);color:var(--text2)}
.rail-btn.on{background:var(--blue-lt);color:var(--blue)}
.rail-btn.on::before{content:'';position:absolute;left:-15px;top:50%;transform:translateY(-50%);width:3px;height:20px;border-radius:0 3px 3px 0;background:var(--blue)}
.rail-sep{width:26px;height:1px;background:var(--border);margin:6px 0}

/* ── SIDEBAR ── */
.sidebar{width:248px;flex-shrink:0;background:var(--card);border-right:1px solid var(--border);display:flex;flex-direction:column;transition:transform .26s cubic-bezier(.22,.8,.2,1);z-index:30}
.sb-top{padding:16px 13px 12px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:9px}
.sb-toprow{display:flex;align-items:center;justify-content:space-between}
.sb-label{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.1em}
.sb-actions{display:flex;gap:6px;align-items:center}
.sb-close{display:none;width:26px;height:26px;border-radius:7px;border:none;background:var(--bg);color:var(--text2);cursor:pointer;align-items:center;justify-content:center}
.sb-close svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2.2}
.new-btn{height:32px;padding:0 13px;border-radius:9px;border:1px solid var(--blue-bd);background:var(--blue-lt);color:var(--blue);font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .13s}
.new-btn:hover{background:rgba(59,110,240,.16)}
.new-btn svg{width:11px;height:11px;stroke:currentColor;fill:none;stroke-width:2.5}
.sb-search{width:100%;padding:8px 11px;border-radius:9px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:12.5px;outline:none;font-family:var(--sans);transition:all .13s}
.sb-search::placeholder{color:var(--text3)}
.sb-search:focus{border-color:var(--blue-bd);background:var(--card);box-shadow:0 0 0 3px rgba(59,110,240,.1)}
.mob-pills{display:none;gap:5px;flex-wrap:wrap;padding-bottom:9px;border-bottom:1px solid var(--border)}
.mob-pill{padding:5px 10px;border-radius:8px;border:1px solid var(--border-md);background:var(--bg);color:var(--text2);font-size:10.5px;font-weight:700;cursor:pointer;transition:all .13s;text-transform:uppercase;letter-spacing:.04em}
.mob-pill.on{background:var(--blue);color:#fff;border-color:var(--blue)}
.sb-list{flex:1;overflow-y:auto;padding:10px}
.sb-empty{padding:32px 12px;text-align:center;font-size:12.5px;color:var(--text3);line-height:1.75}

/* Sidebar cards */
.sb-card{padding:11px 13px;border-radius:10px;cursor:pointer;margin-bottom:7px;border:1px solid var(--border);background:var(--card);box-shadow:var(--sh0);transition:all .13s}
.sb-card:hover{box-shadow:var(--sh1);transform:translateY(-1px)}
.sb-card.sel{border-color:var(--blue-bd);background:var(--blue-lt)}
.sc-name{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sc-meta{font-size:11px;color:var(--text3);margin-top:3px;display:flex;align-items:center;gap:6px}
.sc-tag{padding:1px 7px;border-radius:5px;font-size:10px;font-weight:600;background:var(--blue-lt);color:var(--blue)}

/* ── MAIN ── */
.main{flex:1;overflow:hidden;display:flex;flex-direction:column;background:var(--bg)}

/* Empty state */
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:40px 24px;text-align:center}
.empty-icon{width:58px;height:58px;border-radius:16px;background:var(--blue-lt);display:flex;align-items:center;justify-content:center}
.empty-icon svg{width:26px;height:26px;stroke:var(--blue);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.empty-state h2{font-size:17px;font-weight:700;color:var(--text);letter-spacing:-.015em}
.empty-state p{font-size:13px;color:var(--text2);max-width:300px;line-height:1.75}
.empty-cta{padding:10px 22px;border-radius:10px;background:var(--blue);color:#fff;font-size:13px;font-weight:700;border:none;cursor:pointer;box-shadow:0 4px 14px rgba(59,110,240,.35);transition:all .14s}
.empty-cta:hover{background:#2f5ad6}

/* ── DOC SHELL ── */
.doc{flex:1;display:flex;flex-direction:column;overflow:hidden}
.doc-hd{padding:18px 22px 0;background:var(--card);border-bottom:1px solid var(--border);flex-shrink:0}
.doc-title-row{display:flex;align-items:flex-start;gap:10px;margin-bottom:14px}
.doc-title{flex:1;font-size:19px;font-weight:800;background:transparent;border:none;color:var(--text);outline:none;letter-spacing:-.02em;resize:none;min-height:28px;overflow:hidden;font-family:var(--sans);line-height:1.25}
.doc-title::placeholder{color:var(--text3)}
.doc-badge{padding:4px 11px;border-radius:20px;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;border:none;cursor:default;margin-top:5px;white-space:nowrap}
.bm{background:var(--blue-lt);color:var(--blue)}
.bc{background:var(--green-lt);color:var(--green)}
.br{background:rgba(220,63,63,.09);color:var(--red)}
.doc-tabs{display:flex;padding:0 22px;background:var(--card)}
.dtab{padding:9px 14px;font-size:11px;font-weight:700;color:var(--text3);cursor:pointer;border:none;background:transparent;border-bottom:2.5px solid transparent;margin-bottom:-1px;transition:all .13s;text-transform:uppercase;letter-spacing:.05em}
.dtab:hover{color:var(--text2)}
.dtab.on{color:var(--blue);border-bottom-color:var(--blue)}
.doc-body{flex:1;overflow-y:auto;display:flex;flex-direction:column;min-height:0}
.doc-ft{padding:10px 22px;border-top:1px solid var(--border);background:var(--card);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.ft-info{font-size:11px;color:var(--text3)}
.ft-btns{display:flex;gap:8px}
.btn-del{padding:7px 14px;border-radius:9px;border:1px solid rgba(220,63,63,.25);background:transparent;color:var(--red);font-size:12px;font-weight:600;cursor:pointer;transition:all .13s}
.btn-del:hover{background:var(--red-lt)}
.btn-save{padding:7px 20px;border-radius:9px;background:var(--blue);color:#fff;font-size:12px;font-weight:700;border:none;cursor:pointer;box-shadow:0 2px 8px rgba(59,110,240,.3);transition:all .13s}
.btn-save:hover{background:#2f5ad6;box-shadow:0 4px 14px rgba(59,110,240,.4)}
.btn-save:active{transform:scale(.97)}

/* ── PANELS ── */
.panel{padding:20px 22px;display:flex;flex-direction:column;gap:14px}
.fcard{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:15px 17px;box-shadow:var(--sh0);transition:box-shadow .13s,border-color .13s}
.fcard:focus-within{box-shadow:var(--sh1);border-color:var(--blue-bd)}
.flabel{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:8px}
.finput{width:100%;background:transparent;border:none;outline:none;color:var(--text);font-size:13.5px;line-height:1.75;font-family:var(--sans);resize:none;min-height:52px}
.finput::placeholder{color:var(--text3)}
.finput-sm{width:100%;background:transparent;border:none;outline:none;color:var(--text);font-size:13.5px;font-family:var(--sans)}
.finput-sm::placeholder{color:var(--text3)}
.fcard-red{border-color:rgba(220,63,63,.2)}
.fcard-red:focus-within{border-color:rgba(220,63,63,.45)}
.flabel-red{color:var(--red)}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* ── SKETCH ── */
.sketch-shell{display:flex;flex-direction:column;height:100%;min-height:0}
.sketch-tb{padding:7px 12px;border-bottom:1px solid var(--border);background:var(--card);display:flex;align-items:center;gap:3px;flex-shrink:0;overflow-x:auto}
.sketch-tb::-webkit-scrollbar{height:0}
.stb{width:36px;height:36px;border-radius:9px;border:1px solid transparent;background:transparent;cursor:pointer;color:var(--text3);display:flex;align-items:center;justify-content:center;transition:all .12s;flex-shrink:0}
.stb svg{width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
.stb:hover{background:var(--bg);color:var(--text2);border-color:var(--border)}
.stb.on{background:var(--blue-lt);color:var(--blue);border-color:var(--blue-bd)}
.stb-sep{width:1px;height:20px;background:var(--border);margin:0 3px;flex-shrink:0}
.cpick{width:26px;height:26px;border-radius:7px;border:1px solid var(--border-md);cursor:pointer;padding:0;flex-shrink:0}
.swsel{background:var(--bg);border:1px solid var(--border);color:var(--text2);font-size:11px;padding:4px 6px;border-radius:7px;cursor:pointer;outline:none;flex-shrink:0}
.sketch-hint{font-size:11px;color:var(--text3);padding:4px 12px;background:var(--card);border-top:1px solid var(--border);flex-shrink:0;min-height:22px}
.draw-canvas{flex:1;display:block;width:100%;min-height:0;touch-action:none;cursor:crosshair}

/* ── RULES ── */
.rule-row{display:flex;align-items:flex-start;gap:9px;background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:11px 13px;box-shadow:var(--sh0);transition:all .13s}
.rule-row:hover{box-shadow:var(--sh1)}
.rule-num{width:24px;height:24px;border-radius:7px;background:var(--blue-lt);border:1px solid var(--blue-bd);color:var(--blue);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.rule-inp{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-size:13.5px;line-height:1.6;font-family:var(--sans);resize:none;min-height:24px}
.rule-inp::placeholder{color:var(--text3)}
.rule-rm{width:24px;height:24px;border-radius:6px;border:none;background:transparent;color:var(--text3);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;transition:color .12s}
.rule-rm svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2.2}
.rule-rm:hover{color:var(--red)}
.add-btn{display:flex;align-items:center;gap:7px;padding:10px 14px;border-radius:var(--r2);border:1.5px dashed var(--border-md);background:transparent;color:var(--text3);font-size:12.5px;font-weight:600;cursor:pointer;transition:all .13s;align-self:flex-start}
.add-btn svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2.4}
.add-btn:hover{border-color:var(--blue-bd);color:var(--blue);background:var(--blue-lt)}

/* ── EXAMPLES ── */
.ex-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;box-shadow:var(--sh0)}
.ex-hd{padding:10px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.ex-num{font-size:10.5px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em}
.ex-del{width:24px;height:24px;border-radius:6px;border:none;background:transparent;color:var(--text3);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:color .12s}
.ex-del svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2.2}
.ex-del:hover{color:var(--red)}
.ex-body{padding:13px 15px;display:flex;flex-direction:column;gap:10px}
.ex-desc{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;color:var(--text);font-size:13px;line-height:1.7;font-family:var(--sans);resize:none;min-height:60px;outline:none;transition:all .13s}
.ex-desc:focus{border-color:var(--blue-bd);background:var(--card);box-shadow:0 0 0 3px rgba(59,110,240,.1)}
.ex-desc::placeholder{color:var(--text3)}

/* Image upload */
.img-zone{border:1.5px dashed var(--border-md);border-radius:var(--r2);overflow:hidden;background:var(--bg);min-height:120px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;cursor:pointer;transition:all .13s;position:relative}
.img-zone:hover{border-color:var(--blue-bd);background:var(--blue-lt)}
.img-zone img{width:100%;height:auto;display:block;border-radius:var(--r)}
.img-zone.has-img{border:none;min-height:0}
.img-zone-label{font-size:12px;font-weight:600;color:var(--text3)}
.img-zone-sub{font-size:11px;color:var(--text3)}
.img-zone svg{width:22px;height:22px;stroke:var(--text3);fill:none;stroke-width:1.5}
.img-file-input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.img-actions{display:flex;gap:6px;margin-top:2px}
.img-action-btn{padding:5px 10px;border-radius:7px;border:1px solid var(--border-md);background:var(--bg);color:var(--text2);font-size:11px;font-weight:600;cursor:pointer;transition:all .13s}
.img-action-btn:hover{background:var(--card);box-shadow:var(--sh0)}

/* ── SKETCH AREA IN EXAMPLES ── */
.ex-sketch-shell{border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.ex-stb{padding:5px 8px;border-bottom:1px solid var(--border);background:var(--card);display:flex;gap:3px;align-items:center;overflow-x:auto}
.ex-stb::-webkit-scrollbar{height:0}
.ex-canvas{display:block;width:100%;height:200px;touch-action:none;cursor:crosshair;background:#fafbfc}

/* ── MOBILE ── */
.mob-bar{display:none;position:fixed;top:0;left:0;right:0;height:52px;background:var(--card);border-bottom:1px solid var(--border);z-index:40;align-items:center;padding:0 14px;gap:10px;box-shadow:var(--sh0)}
.mob-bar h1{font-size:15px;font-weight:700;flex:1}
.ham{width:36px;height:36px;border-radius:9px;border:1px solid var(--border-md);background:var(--card);display:flex;align-items:center;justify-content:center;cursor:pointer}
.ham svg{width:16px;height:16px;stroke:var(--text);fill:none;stroke-width:1.9;stroke-linecap:round}
.scrim{display:none;position:fixed;inset:0;background:rgba(15,23,42,.3);backdrop-filter:blur(2px);z-index:25;opacity:0;transition:opacity .22s}
.scrim.open{display:block;opacity:1}

@media(max-width:760px){
  .mob-bar{display:flex}
  .rail{display:none}
  .sidebar{position:fixed;inset:0 auto 0 0;transform:translateX(-101%);width:80vw;max-width:290px;box-shadow:var(--sh3);padding-top:52px}
  .sidebar.open{transform:translateX(0)}
  .sb-close{display:flex}
  .mob-pills{display:flex}
  .main{padding-top:52px}
  .doc-hd{padding-top:14px}
  .panel{padding:14px}
  .two-col{grid-template-columns:1fr}
}

/* ── TOAST ── */
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(6px);background:var(--text);color:#fff;font-size:12px;font-weight:600;padding:8px 18px;border-radius:22px;opacity:0;transition:all .22s cubic-bezier(.2,.8,.2,1);pointer-events:none;z-index:999;box-shadow:var(--sh3)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border-md);border-radius:2px}
</style>
</head>

<style>
.install-bar{display:none;position:fixed;bottom:0;left:0;right:0;z-index:200;background:var(--blue);color:#fff;padding:12px 18px;align-items:center;gap:12px;box-shadow:0 -4px 20px rgba(59,110,240,.3)}
.install-bar.show{display:flex}
.install-bar-text{flex:1;font-size:13px;font-weight:600;line-height:1.4}
.install-bar-text small{display:block;font-size:11px;font-weight:400;opacity:.8;margin-top:1px}
.install-bar-btn{padding:8px 16px;border-radius:9px;border:none;background:#fff;color:var(--blue);font-size:12px;font-weight:800;cursor:pointer;flex-shrink:0;transition:all .13s}
.install-bar-btn:hover{background:rgba(255,255,255,.9)}
.install-bar-close{width:28px;height:28px;border-radius:7px;border:none;background:rgba(255,255,255,.2);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px;line-height:1}
</style>

<!-- PWA Install banner -->
<div class="install-bar" id="installBar">
  <div class="install-bar-text">
    Install Trading KB
    <small>Works offline · Stays on your home screen</small>
  </div>
  <button class="install-bar-btn" id="installBtn" onclick="triggerInstall()">Install</button>
  <button class="install-bar-close" onclick="dismissInstall()">×</button>
</div>
<div class="mob-bar">
  <button class="ham" onclick="openSB()"><svg viewBox="0 0 20 20"><line x1="2" y1="5" x2="18" y2="5"/><line x1="2" y1="10" x2="18" y2="10"/><line x1="2" y1="15" x2="18" y2="15"/></svg></button>
  <h1 id="mobTitle">Trading KB</h1>
</div>
<div class="scrim" id="scrim" onclick="closeSB()"></div>

<div class="app">

  <!-- Rail -->
  <nav class="rail">
    <div class="rail-logo">
      <svg viewBox="0 0 22 22"><polyline points="2,16 6,8 10,12 14,5 18,8"/><polyline points="15,5 18,5 18,8"/></svg>
    </div>
    <button class="rail-btn on" data-s="models" onclick="goSec('models',this)">
      <svg viewBox="0 0 22 22"><rect x="3" y="3" width="6" height="6" rx="1.5"/><rect x="13" y="3" width="6" height="6" rx="1.5"/><rect x="3" y="13" width="6" height="6" rx="1.5"/><rect x="13" y="13" width="6" height="6" rx="1.5"/></svg>
      <span>Models</span>
    </button>
    <button class="rail-btn" data-s="concepts" onclick="goSec('concepts',this)">
      <svg viewBox="0 0 22 22"><path d="M11 2a6 6 0 0 1 6 6c0 3-2 5-2 7H7c0-2-2-4-2-7a6 6 0 0 1 6-6z"/><line x1="8" y1="19" x2="14" y2="19"/><line x1="9" y1="21" x2="13" y2="21"/></svg>
      <span>Concepts</span>
    </button>
    <button class="rail-btn" data-s="rules" onclick="goSec('rules',this)">
      <svg viewBox="0 0 22 22"><line x1="7" y1="6" x2="18" y2="6"/><line x1="7" y1="11" x2="18" y2="11"/><line x1="7" y1="16" x2="18" y2="16"/><circle cx="3.5" cy="6" r="1.3" fill="currentColor" stroke="none"/><circle cx="3.5" cy="11" r="1.3" fill="currentColor" stroke="none"/><circle cx="3.5" cy="16" r="1.3" fill="currentColor" stroke="none"/></svg>
      <span>Rules</span>
    </button>
  </nav>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sb-top">
      <div class="sb-toprow">
        <span class="sb-label" id="sbLabel">Models</span>
        <div class="sb-actions">
          <button class="new-btn" onclick="newEntry()">
            <svg viewBox="0 0 12 12"><line x1="6" y1="1" x2="6" y2="11"/><line x1="1" y1="6" x2="11" y2="6"/></svg>
            New
          </button>
          <button class="sb-close" id="sbClose" onclick="closeSB()">
            <svg viewBox="0 0 14 14"><line x1="1" y1="1" x2="13" y2="13"/><line x1="13" y1="1" x2="1" y2="13"/></svg>
          </button>
        </div>
      </div>
      <div class="mob-pills" id="mobPills"></div>
      <input class="sb-search" id="sbSearch" type="text" placeholder="Search…" oninput="filterList(this.value)">
    </div>
    <div class="sb-list" id="sbList"></div>
  </aside>

  <!-- Main -->
  <main class="main" id="main">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">
        <svg viewBox="0 0 24 24"><polyline points="3,17 7,9 11,13 15,5 19,9"/><polyline points="16,5 19,5 19,8"/></svg>
      </div>
      <h2>Your Trading Knowledge Base</h2>
      <p>Document models, concepts and rules. Come back daily to re-read and refine until every setup is second nature.</p>
      <button class="empty-cta" onclick="newEntry()">Create first entry</button>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── DB ──────────────────────────────────────────────────────────
let db;
function openDB(){
  return new Promise((res,rej)=>{
    const q=indexedDB.open('tkb2',1);
    q.onupgradeneeded=e=>e.target.result.createObjectStore('kv',{keyPath:'k'});
    q.onsuccess=e=>{db=e.target.result;res();};
    q.onerror=rej;
  });
}
function dbGet(k){return new Promise((res,rej)=>{const r=db.transaction('kv','readonly').objectStore('kv').get(k);r.onsuccess=e=>res(e.target.result?.v??null);r.onerror=rej;});}
function dbSet(k,v){return new Promise((res,rej)=>{const tx=db.transaction('kv','readwrite');tx.objectStore('kv').put({k,v});tx.oncomplete=res;tx.onerror=rej;});}

// ─── STATE ───────────────────────────────────────────────────────
let sec='models';
let store={models:[],concepts:[],rules:[]};
let sel=null;
let docTab={models:'overview',concepts:'notes',rules:'rules'};
const SEC={models:{label:'Models',badge:'bm',tabs:['overview','sketch','examples']},
           concepts:{label:'Concepts',badge:'bc',tabs:['notes','sketch']},
           rules:{label:'Rules',badge:'br',tabs:['rules']}};

// ─── INIT ────────────────────────────────────────────────────────
async function init(){
  await openDB();
  for(const k of Object.keys(store)){
    try{const v=await dbGet('tkb-'+k);if(v)store[k]=JSON.parse(v);}catch(e){}
  }
  renderPills();renderList();
}
async function persist(){await dbSet('tkb-'+sec,JSON.stringify(store[sec]));}
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),2000);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function ar(el){el.style.height='auto';el.style.height=el.scrollHeight+'px';}

// ─── SECTION NAV ─────────────────────────────────────────────────
function goSec(s,btn){
  sec=s;sel=null;
  document.querySelectorAll('.rail-btn').forEach(b=>b.classList.toggle('on',b.dataset.s===s));
  document.getElementById('sbLabel').textContent=SEC[s].label;
  document.getElementById('sbSearch').value='';
  document.getElementById('mobTitle').textContent=SEC[s].label;
  renderPills();renderList();renderMain();
}
function renderPills(){
  document.getElementById('mobPills').innerHTML=Object.keys(SEC).map(k=>
    `<button class="mob-pill ${k===sec?'on':''}" onclick="goSecMob('${k}')">${SEC[k].label}</button>`
  ).join('');
}
function goSecMob(s){
  sec=s;sel=null;
  document.querySelectorAll('.rail-btn').forEach(b=>b.classList.toggle('on',b.dataset.s===s));
  document.getElementById('sbLabel').textContent=SEC[s].label;
  document.getElementById('mobTitle').textContent=SEC[s].label;
  document.getElementById('sbSearch').value='';
  renderPills();renderList();renderMain();
}

// ─── SIDEBAR ─────────────────────────────────────────────────────
function openSB(){document.getElementById('sidebar').classList.add('open');document.getElementById('scrim').classList.add('open');}
function closeSB(){document.getElementById('sidebar').classList.remove('open');document.getElementById('scrim').classList.remove('open');}

function renderList(filter=''){
  const el=document.getElementById('sbList');
  let items=store[sec];
  if(filter)items=items.filter(i=>(i.title||'').toLowerCase().includes(filter.toLowerCase()));
  if(!items.length){
    el.innerHTML=`<div class="sb-empty">${filter?'No results.':'Nothing here yet — hit New to start.'}</div>`;return;
  }
  el.innerHTML=items.map(it=>`
    <div class="sb-card ${sel&&sel.id===it.id?'sel':''}" onclick="pick(${it.id})">
      <div class="sc-name">${esc(it.title)||'Untitled'}</div>
      <div class="sc-meta">${it.tag?`<span class="sc-tag">${esc(it.tag)}</span>`:''}
        <span>${it.date||''}</span>
      </div>
    </div>`).join('');
}
function filterList(v){renderList(v);}
function pick(id){
  sel=store[sec].find(x=>x.id===id)||null;
  renderList();renderMain();
  if(window.innerWidth<=760)closeSB();
}

// ─── NEW ENTRY ───────────────────────────────────────────────────
function newEntry(){
  const it={
    id:Date.now(),title:'',tag:'',
    date:new Date().toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}),
    // model
    description:'',market_structure:'',entry_trigger:'',
    confluences:'',invalidation:'',sl_logic:'',target_logic:'',
    sketch:'',examples:[],
    // concept
    concept_notes:'',concept_sketch:'',
    // rules
    rules_intro:'',rules:[{t:''},{t:''},{t:''}]
  };
  store[sec].unshift(it);sel=it;
  persist();renderList();renderMain();
  if(window.innerWidth<=760)closeSB();
}
async function deleteEntry(){
  if(!sel||!confirm('Delete this entry?'))return;
  store[sec]=store[sec].filter(x=>x.id!==sel.id);
  sel=null;await persist();renderList();renderMain();
}

// ─── MAIN RENDER ─────────────────────────────────────────────────
function renderMain(){
  const el=document.getElementById('main');
  if(!sel){
    el.innerHTML=`<div class="empty-state">
      <div class="empty-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3,17 7,9 11,13 15,5 19,9"/><polyline points="16,5 19,5 19,8"/></svg></div>
      <h2>${SEC[sec].label}</h2>
      <p>${{models:'Select a model or create a new one.',concepts:'Select a concept or create a new one.',rules:'Select a rule set or create a new one.'}[sec]}</p>
      <button class="empty-cta" onclick="newEntry()">New ${SEC[sec].label.slice(0,-1)}</button>
    </div>`;return;
  }
  const tabs=SEC[sec].tabs;
  const ct=docTab[sec]||tabs[0];
  el.innerHTML=`<div class="doc">
    <div class="doc-hd">
      <div class="doc-title-row">
        <textarea class="doc-title" id="docTitle" rows="1"
          placeholder="${sec==='models'?'Model name…':sec==='concepts'?'Concept name…':'Rule set name…'}"
          oninput="sel.title=this.value;ar(this);renderList()">${esc(sel.title)}</textarea>
        <span class="doc-badge ${SEC[sec].badge}">${SEC[sec].label.slice(0,-1)}</span>
      </div>
    </div>
    <div class="doc-tabs">
      ${tabs.map(t=>`<button class="dtab ${t===ct?'on':''}" onclick="switchTab('${t}',this)">${{overview:'Overview',sketch:'Sketch',examples:'Examples',notes:'Notes',rules:'Rules'}[t]}</button>`).join('')}
    </div>
    <div class="doc-body" id="docBody"></div>
    <div class="doc-ft">
      <span class="ft-info">${sel.date}</span>
      <div class="ft-btns">
        <button class="btn-del" onclick="deleteEntry()">Delete</button>
        <button class="btn-save" onclick="saveEntry()">Save</button>
      </div>
    </div>
  </div>`;
  renderTab(ct);
  setTimeout(()=>{const t=document.getElementById('docTitle');if(t)ar(t);},0);
}

function switchTab(t,btn){
  // Save sketch before switching away
  const old=docTab[sec];
  if(old==='sketch') captureSketch();
  docTab[sec]=t;
  document.querySelectorAll('.dtab').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  renderTab(t);
}

function renderTab(t){
  const el=document.getElementById('docBody');if(!el)return;
  if(t==='overview') renderOverview(el);
  else if(t==='sketch') renderSketch(el);
  else if(t==='examples') renderExamples(el);
  else if(t==='notes') renderNotes(el);
  else if(t==='rules') renderRules(el);
}

// ─── OVERVIEW ────────────────────────────────────────────────────
function renderOverview(el){
  el.innerHTML=`<div class="panel">
    <div class="fcard">
      <div class="flabel">Description</div>
      <textarea class="finput" rows="4" placeholder="Describe this setup in your own words — what it is, what it looks like in real time, why it works…" oninput="sel.description=this.value">${esc(sel.description)}</textarea>
    </div>
    <div class="fcard">
      <div class="flabel">Market structure required</div>
      <textarea class="finput" rows="3" placeholder="What must the higher timeframe structure look like before this setup is valid?" oninput="sel.market_structure=this.value">${esc(sel.market_structure)}</textarea>
    </div>
    <div class="two-col">
      <div class="fcard">
        <div class="flabel">Entry trigger</div>
        <textarea class="finput" rows="3" placeholder="The exact condition that triggers your entry…" oninput="sel.entry_trigger=this.value">${esc(sel.entry_trigger)}</textarea>
      </div>
      <div class="fcard">
        <div class="flabel">Confluences</div>
        <textarea class="finput" rows="3" placeholder="What stacks the odds in your favour?" oninput="sel.confluences=this.value">${esc(sel.confluences)}</textarea>
      </div>
    </div>
    <div class="two-col">
      <div class="fcard">
        <div class="flabel">Stop loss logic</div>
        <textarea class="finput" rows="3" placeholder="Where does your stop go and why?" oninput="sel.sl_logic=this.value">${esc(sel.sl_logic)}</textarea>
      </div>
      <div class="fcard">
        <div class="flabel">Target logic</div>
        <textarea class="finput" rows="3" placeholder="Where do you take profit and why?" oninput="sel.target_logic=this.value">${esc(sel.target_logic)}</textarea>
      </div>
    </div>
    <div class="fcard fcard-red">
      <div class="flabel flabel-red">Invalidation</div>
      <textarea class="finput" rows="3" placeholder="What price action tells you this setup is off?" oninput="sel.invalidation=this.value">${esc(sel.invalidation)}</textarea>

    <div class="fcard">
      <div class="flabel">Tag</div>
      <input type="text" class="finput-sm" placeholder="e.g. FVG reversal, OB pullback…" value="${esc(sel.tag)}" oninput="sel.tag=this.value;renderList()">

// ─── NOTES (concepts) ────────────────────────────────────────────
function renderNotes(el){
  el.innerHTML=`<div class="panel">
    <div class="fcard" style="flex:1">
      <div class="flabel">Concept notes</div>
      <textarea class="finput" style="min-height:280px" placeholder="Explain this concept in your own words. How do you define it? How do you identify it on a chart? Why does it matter in your system?

Write it the way you understand it — not how a book explains it." oninput="sel.concept_notes=this.value">${esc(sel.concept_notes)}</textarea>
    </div>
  </div>`;
}

// ─── RULES ───────────────────────────────────────────────────────
function renderRules(el){

    <div class="fcard">
      <div class="flabel">About this rule set</div>
      <textarea class="finput" style="min-height:36px" placeholder="What behaviour are these rules enforcing?" oninput="sel.rules_intro=this.value">${esc(sel.rules_intro||'')}</textarea>
    </div>
    <div id="rulesList"></div>
    <button class="add-btn" onclick="addRule()">
      <svg viewBox="0 0 12 12"><line x1="6" y1="1" x2="6" y2="11"/><line x1="1" y1="6" x2="11" y2="6"/></svg>
      Add rule
    </button>
  </div>`;
  renderRuleRows();
}
function renderRuleRows(){
  const el=document.getElementById('rulesList');if(!el)return;
  el.innerHTML=sel.rules.map((r,i)=>`
    <div class="rule-row">
      <div class="rule-num">${i+1}</div>
      <textarea class="rule-inp" rows="1" placeholder="Write rule ${i+1}…" oninput="sel.rules[${i}].t=this.value;ar(this)" onfocus="ar(this)">${esc(r.t||'')}</textarea>
      <button class="rule-rm" onclick="removeRule(${i})"><svg viewBox="0 0 14 14"><line x1="1" y1="1" x2="13" y2="13"/><line x1="13" y1="1" x2="1" y2="13"/></svg></button>
    </div>`).join('');
  setTimeout(()=>document.querySelectorAll('.rule-inp').forEach(t=>ar(t)),0);
}
function addRule(){sel.rules.push({t:''});renderRuleRows();}
function removeRule(i){sel.rules.splice(i,1);renderRuleRows();}

// ─── EXAMPLES ────────────────────────────────────────────────────
function renderExamples(el){
  if(!sel.examples)sel.examples=[];
  el.innerHTML=`<div class="panel">
    ${sel.examples.map((ex,i)=>exCardHTML(ex,i)).join('')}
    <button class="add-btn" onclick="addExample()">
      <svg viewBox="0 0 12 12"><line x1="6" y1="1" x2="6" y2="11"/><line x1="1" y1="6" x2="11" y2="6"/></svg>
      Add example
    </button>

function exCardHTML(ex,i){
  const cid=`ec${sel.id}x${i}`;

    <div class="ex-hd">
      <span class="ex-num">Example ${i+1}</span>
      <button class="ex-del" onclick="removeExample(${i})"><svg viewBox="0 0 14 14"><line x1="1" y1="1" x2="13" y2="13"/><line x1="13" y1="1" x2="1" y2="13"/></svg></button>
    </div>
    <div class="ex-body">
      <textarea class="ex-desc" rows="2" placeholder="Describe this example — what you saw, why it qualified, how it played out…" oninput="sel.examples[${i}].desc=this.value">${esc(ex.desc||'')}</textarea>

      <!-- Image upload -->
      <div id="imgzone${i}">
        ${ex.img
          ? `<div style="position:relative">
               <img src="${ex.img}" style="width:100%;border-radius:8px;display:block" alt="chart">
               <div class="img-actions">
                 <button class="img-action-btn" onclick="changeImg(${i})">Replace</button>

          : `<div class="img-zone" onclick="triggerImgUpload(${i})">
               <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21,15 16,10 5,21"/></svg>

               <div class="img-zone-sub">From your phone gallery</div>

        }
        <input type="file" accept="image/*" id="imgfile${i}" style="display:none" onchange="handleImg(${i},this)">
      </div>

      <!-- Mini sketch -->
      <div class="ex-sketch-shell">
        <div class="ex-stb" id="extb${cid}">${miniTbHTML(cid)}</div>

}

// Image handling
function triggerImgUpload(i){document.getElementById(`imgfile${i}`)?.click();}
function changeImg(i){document.getElementById(`imgfile${i}`)?.click();}
function removeImg(i){
  sel.examples[i].img='';
  renderExamples(document.getElementById('docBody'));
}
function handleImg(i,input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    sel.examples[i].img=e.target.result;
    // re-render just the image zone
    const zone=document.getElementById(`imgzone${i}`);
    if(zone){
      zone.innerHTML=`<div style="position:relative">
        <img src="${sel.examples[i].img}" style="width:100%;border-radius:8px;display:block" alt="chart">
        <div class="img-actions">
          <button class="img-action-btn" onclick="changeImg(${i})">Replace</button>
          <button class="img-action-btn" onclick="removeImg(${i})">Remove</button>
        </div>
      </div>
      <input type="file" accept="image/*" id="imgfile${i}" style="display:none" onchange="handleImg(${i},this)">`;
    }
  };
  reader.readAsDataURL(file);
}

function addExample(){
  if(!sel.examples)sel.examples=[];
  sel.examples.push({desc:'',img:'',sketch:''});
  renderExamples(document.getElementById('docBody'));
}
function removeExample(i){
  if(!confirm('Remove this example?'))return;
  const cid=`ec${sel.id}x${i}`;
  killChart(cid);
  sel.examples.splice(i,1);
  renderExamples(document.getElementById('docBody'));

// ─── DRAWING ENGINE ──────────────────────────────────────────────
// Canvas 2D — TradingView-style: Trendline, Path, Rectangle
// All tools coexist on one canvas. Switch freely — nothing clears.
// Drawings stored as JSON (chart coords), not pixel coords.

const HR=12,VR=5,VH=13; // hit radius, visual radius, visual hit radius
const SEL_C='#3b6ef0',GRID_C='rgba(15,23,42,.055)',CVS_BG='#fafbfc';

class DChart{
  constructor(cv,json){
    this.cv=cv; this.ctx=cv.getContext('2d');
    this.D=json?JSON.parse(json):[]; // drawings array
    this.tool='trendline';
    this.color='#ef5350'; this.sw=2; this.ls='solid';
    this.selId=null; this.hoverId=null;
    this.drag=null; this.ds=null; // draw state
    this.hist=[]; this.fut=[];
    this._dirty=true; this._raf=null;
    this.vp={pMin:0,pMax:100,tMin:0,tMax:100};
    this._resize(); this._bind(); this._loop();
  }
  get W(){return this.cv.width/(window.devicePixelRatio||1);}
  get H(){return this.cv.height/(window.devicePixelRatio||1);}
  get dW(){return this.W-52;} // leave space for price axis
  get dH(){return this.H-18;} // leave space for time axis

  // Coord transforms — drawings stored in 0-100 space
  toPx(cx,cy){const v=this.vp;return{x:cx/100*this.dW,y:(1-cy/100)*this.dH};}
  fromPx(px,py){return{x:px/this.dW*100,y:(1-py/this.dH)*100};}

  _resize(){
    const dpr=window.devicePixelRatio||1;
    const r=this.cv.getBoundingClientRect();
    if(!r.width)return;
    this.cv.width=r.width*dpr; this.cv.height=r.height*dpr;
    this.ctx.scale(dpr,dpr); this._dirty=true;
  }
  _loop(){this._raf=requestAnimationFrame(()=>this._loop());if(!this._dirty)return;this._dirty=false;this._render();}
  mark(){this._dirty=true;}

  _render(){
    const ctx=this.ctx,W=this.W,H=this.H;
    ctx.clearRect(0,0,W,H);
    ctx.fillStyle=CVS_BG; ctx.fillRect(0,0,this.dW,this.dH);
    this._grid();
    ctx.save();ctx.beginPath();ctx.rect(0,0,this.dW,this.dH);ctx.clip();
    this.D.forEach(d=>this._drawShape(d,d.id===this.selId,d.id===this.hoverId&&d.id!==this.selId));
    if(this.ds)this._drawLive();
    ctx.restore();
    this._axes();
  }

  _grid(){
    const ctx=this.ctx; ctx.strokeStyle=GRID_C; ctx.lineWidth=0.5;
    for(let i=1;i<8;i++){const x=i/8*this.dW;ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,this.dH);ctx.stroke();}
    for(let i=1;i<6;i++){const y=i/6*this.dH;ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(this.dW,y);ctx.stroke();}
  }
  _axes(){
    const ctx=this.ctx;
    ctx.fillStyle='#f0f2f6';
    ctx.fillRect(this.dW,0,52,this.H); ctx.fillRect(0,this.dH,this.dW,18);
    ctx.strokeStyle='rgba(15,23,42,.2)';ctx.lineWidth=0.5;ctx.setLineDash([]);
    ctx.beginPath();ctx.moveTo(this.dW,0);ctx.lineTo(this.dW,this.dH);ctx.stroke();
    ctx.beginPath();ctx.moveTo(0,this.dH);ctx.lineTo(this.dW,this.dH);ctx.stroke();
    ctx.fillStyle='rgba(15,23,42,.4)';ctx.font='9px monospace';ctx.textAlign='left';
    for(let i=0;i<=5;i++){const y=this.dH-i/5*this.dH;ctx.fillText((i*20).toString(),this.dW+5,y+3);}
    ctx.textAlign='center';
    for(let i=0;i<=7;i++){ctx.fillText((i*100/7).toFixed(0),i/7*this.dW,this.dH+13);}
  }

  _stroke(ctx,color,w,ls,sel){
    ctx.strokeStyle=sel?SEL_C:color; ctx.lineWidth=sel?w+1:w;
    ctx.lineCap='round';ctx.lineJoin='round';
    if(ls==='dashed')ctx.setLineDash([w*4,w*3]);
    else if(ls==='dotted')ctx.setLineDash([w,w*2]);
    else ctx.setLineDash([]);
  }

  _drawShape(d,sel,hov){
    const ctx=this.ctx;
    ctx.globalAlpha=hov?0.6:1;
    if(d.type==='trendline'){
      const p1=this.toPx(d.x1,d.y1),p2=this.toPx(d.x2,d.y2);
      this._stroke(ctx,d.color,d.w,d.ls,sel);
      ctx.beginPath();ctx.moveTo(p1.x,p1.y);ctx.lineTo(p2.x,p2.y);ctx.stroke();
      ctx.setLineDash([]);
      if(sel||hov){this._handle(p1.x,p1.y,sel);this._handle(p2.x,p2.y,sel);}
    } else if(d.type==='path'){
      if(d.pts.length<2){ctx.globalAlpha=1;return;}
      this._stroke(ctx,d.color,d.w,d.ls,sel);
      ctx.beginPath();
      const p0=this.toPx(d.pts[0].x,d.pts[0].y);ctx.moveTo(p0.x,p0.y);
      d.pts.slice(1).forEach(pt=>{const p=this.toPx(pt.x,pt.y);ctx.lineTo(p.x,p.y);});
      ctx.stroke();ctx.setLineDash([]);
      if(sel||hov)d.pts.forEach(pt=>{const p=this.toPx(pt.x,pt.y);this._handle(p.x,p.y,sel);});
    } else if(d.type==='rect'){
      const p1=this.toPx(d.x1,d.y1),p2=this.toPx(d.x2,d.y2);
      const rx=Math.min(p1.x,p2.x),ry=Math.min(p1.y,p2.y),rw=Math.abs(p2.x-p1.x),rh=Math.abs(p2.y-p1.y);
      ctx.fillStyle=d.color;ctx.globalAlpha*=0.09;ctx.fillRect(rx,ry,rw,rh);
      ctx.globalAlpha=hov?0.6:1;
      this._stroke(ctx,d.color,d.w,d.ls,sel);ctx.strokeRect(rx,ry,rw,rh);ctx.setLineDash([]);
      if(sel||hov){
        const mx=(p1.x+p2.x)/2,my=(p1.y+p2.y)/2;
        [[p1.x,p1.y],[p2.x,p1.y],[p2.x,p2.y],[p1.x,p2.y],[mx,p1.y],[p2.x,my],[mx,p2.y],[p1.x,my],[mx,my]]
        .forEach(([x,y])=>this._handle(x,y,sel));
      }
    }
    ctx.globalAlpha=1;
  }

  _handle(x,y,sel){
    const ctx=this.ctx;ctx.setLineDash([]);
    ctx.beginPath();ctx.arc(x,y,VR,0,Math.PI*2);
    ctx.fillStyle='#fff';ctx.fill();
    ctx.strokeStyle=sel?SEL_C:'#6b7280';ctx.lineWidth=1.5;ctx.stroke();
  }

  _drawLive(){
    const ds=this.ds,ctx=this.ctx;if(!ds||!ds.pts.length)return;
    ctx.globalAlpha=0.72;
    const fake={id:'__live',type:ds.tool,color:this.color,w:this.sw,ls:this.ls,
      pts:ds.pts,x1:ds.pts[0].x,y1:ds.pts[0].y,
      x2:(ds.pts[1]||ds.pts[0]).x,y2:(ds.pts[1]||ds.pts[0]).y};
    this._drawShape(fake,false,false);
    ctx.globalAlpha=1;
  }

  _bind(){
    const cv=this.cv;
    const gp=e=>{const r=cv.getBoundingClientRect();const s=e.touches?e.touches[0]:e;return{x:s.clientX-r.left,y:s.clientY-r.top};};
    const gu=e=>{const r=cv.getBoundingClientRect();const s=e.changedTouches?e.changedTouches[0]:e;return{x:s.clientX-r.left,y:s.clientY-r.top};};
    cv.addEventListener('mousedown',e=>{if(e.button===0)this._dn(gp(e));});
    cv.addEventListener('mousemove',e=>this._mv(gp(e)));
    cv.addEventListener('mouseup',e=>{if(e.button===0)this._up(gu(e));});
    cv.addEventListener('dblclick',e=>this._dbl(gp(e)));
    cv.addEventListener('touchstart',e=>{e.preventDefault();this._dn(gp(e));},{passive:false});
    cv.addEventListener('touchmove',e=>{e.preventDefault();this._mv(gp(e));},{passive:false});
    cv.addEventListener('touchend',e=>{e.preventDefault();this._up(gu(e));},{passive:false});
    const ro=new ResizeObserver(()=>{this._resize();this.mark();});ro.observe(cv);
    this._kfn=e=>{
      if(!document.getElementById(cv.id))return;
      if(e.key==='Escape'){this.ds=null;this.selId=null;this.mark();}
      if(e.key==='Enter')this._finish();
      if((e.key==='Delete'||e.key==='Backspace')&&this.selId&&document.activeElement===document.body)this._del();
      if((e.ctrlKey||e.metaKey)&&e.key==='z'){e.preventDefault();this.undo();}
      if((e.ctrlKey||e.metaKey)&&(e.key==='y'||e.key==='Y')){e.preventDefault();this.redo();}
    };
    window.addEventListener('keydown',this._kfn);
  }

  _dn(p){
    if(p.x>this.dW||p.y>this.dH)return;
    // In-progress draw — add point
    if(this.ds){this._click(p);return;}
    // Hit handle on selected drawing?
    if(this.selId){
      const hi=this._hitHandle(this.selId,p);
      if(hi!==-1){
        this._ph();
        const orig=JSON.parse(JSON.stringify(this.D.find(x=>x.id===this.selId)));
        this.drag={t:'handle',id:this.selId,hi,orig,sp:this.fromPx(p.x,p.y)};
        return;
      }
    }
    // Hit any drawing body?
    const hit=this._hitBody(p);
    if(hit){
      this.selId=hit.id;this._ph();
      this.drag={t:'body',id:hit.id,orig:JSON.parse(JSON.stringify(hit)),sp:this.fromPx(p.x,p.y)};
      this.mark();return;
    }
    // Start new drawing
    this.selId=null;
    const cp=this.fromPx(p.x,p.y);
    if(this.tool==='trendline')this.ds={tool:'trendline',pts:[{...cp},{...cp}]};
    else if(this.tool==='path')this.ds={tool:'path',pts:[{...cp},{...cp}]};
    else if(this.tool==='rect')this.ds={tool:'rect',pts:[{...cp},{...cp}]};
    this.mark();
  }

  _mv(p){
    const cp=this.fromPx(p.x,p.y);
    if(this.drag){
      const d=this.D.find(x=>x.id===this.drag.id);
      if(d){
        if(this.drag.t==='handle')this._mh(d,this.drag.hi,cp);
        else{const dx=cp.x-this.drag.sp.x,dy=cp.y-this.drag.sp.y;this._tr(d,this.drag.orig,dx,dy);}
      }
      this.mark();return;
    }
    if(this.ds){const pts=this.ds.pts;pts[pts.length-1]={...cp};this.mark();return;}
    const hit=this._hitBody(p);
    const nh=hit?hit.id:null;
    if(nh!==this.hoverId){this.hoverId=nh;this.mark();}
    this.cv.style.cursor=hit?'move':'crosshair';
  }

  _up(){if(this.drag){this.drag=null;this.fut=[];}}

  _dbl(p){if(this.ds?.tool==='path')this._finish();}

  _click(p){
    const cp=this.fromPx(p.x,p.y),ds=this.ds;
    if(ds.tool==='trendline'){ds.pts[1]={...cp};this._commit();}
    else if(ds.tool==='rect'){ds.pts[1]={...cp};this._commit();}
    else if(ds.tool==='path'){ds.pts[ds.pts.length-1]={...cp};ds.pts.push({...cp});}
  }

  _finish(){
    if(!this.ds)return;
    if(this.ds.tool==='path'&&this.ds.pts.length>2){this.ds.pts.pop();this._commit();}
    else{this.ds=null;this.mark();}
  }

  _commit(){
    const ds=this.ds;this._ph();
    const id='d'+Date.now()+Math.random().toString(36).slice(2,5);
    let d;
    if(ds.tool==='trendline')d={id,type:'trendline',color:this.color,w:this.sw,ls:this.ls,x1:ds.pts[0].x,y1:ds.pts[0].y,x2:ds.pts[1].x,y2:ds.pts[1].y};
    else if(ds.tool==='path')d={id,type:'path',color:this.color,w:this.sw,ls:this.ls,pts:[...ds.pts]};
    else if(ds.tool==='rect')d={id,type:'rect',color:this.color,w:this.sw,ls:this.ls,x1:ds.pts[0].x,y1:ds.pts[0].y,x2:ds.pts[1].x,y2:ds.pts[1].y};
    this.D.push(d);this.selId=id;this.ds=null;this.fut=[];this.mark();
  }

  _hitBody(p){
    for(let i=this.D.length-1;i>=0;i--){
      const d=this.D[i];
      if(d.type==='trendline'){const p1=this.toPx(d.x1,d.y1),p2=this.toPx(d.x2,d.y2);if(this._ds(p,p1,p2)<HR)return d;}
      else if(d.type==='path'){for(let j=0;j<d.pts.length-1;j++){const a=this.toPx(d.pts[j].x,d.pts[j].y),b=this.toPx(d.pts[j+1].x,d.pts[j+1].y);if(this._ds(p,a,b)<HR)return d;}}
      else if(d.type==='rect'){const p1=this.toPx(d.x1,d.y1),p2=this.toPx(d.x2,d.y2);const rx=Math.min(p1.x,p2.x)-HR,ry=Math.min(p1.y,p2.y)-HR,rw=Math.abs(p2.x-p1.x)+HR*2,rh=Math.abs(p2.y-p1.y)+HR*2;if(p.x>=rx&&p.x<=rx+rw&&p.y>=ry&&p.y<=ry+rh)return d;}
    }
    return null;
  }
  _ds(p,a,b){const dx=b.x-a.x,dy=b.y-a.y;if(!dx&&!dy)return Math.hypot(p.x-a.x,p.y-a.y);const t=Math.max(0,Math.min(1,((p.x-a.x)*dx+(p.y-a.y)*dy)/(dx*dx+dy*dy)));return Math.hypot(p.x-(a.x+t*dx),p.y-(a.y+t*dy));}

  _hitHandle(id,p){
    const d=this.D.find(x=>x.id===id);if(!d)return -1;
    const hs=d.type==='trendline'?[{x:d.x1,y:d.y1},{x:d.x2,y:d.y2}]:d.type==='path'?d.pts:
      [{x:d.x1,y:d.y1},{x:d.x2,y:d.y1},{x:d.x2,y:d.y2},{x:d.x1,y:d.y2},
       {x:(d.x1+d.x2)/2,y:d.y1},{x:d.x2,y:(d.y1+d.y2)/2},{x:(d.x1+d.x2)/2,y:d.y2},
       {x:d.x1,y:(d.y1+d.y2)/2},{x:(d.x1+d.x2)/2,y:(d.y1+d.y2)/2}];
    for(let i=0;i<hs.length;i++){const hp=this.toPx(hs[i].x,hs[i].y);if(Math.hypot(p.x-hp.x,p.y-hp.y)<VH)return i;}
    return -1;
  }

  _mh(d,hi,cp){
    if(d.type==='trendline'){hi===0?(d.x1=cp.x,d.y1=cp.y):(d.x2=cp.x,d.y2=cp.y);}
    else if(d.type==='path'){d.pts[hi]={...cp};}
    else if(d.type==='rect'){
      if(hi===0){d.x1=cp.x;d.y1=cp.y;}else if(hi===1){d.x2=cp.x;d.y1=cp.y;}
      else if(hi===2){d.x2=cp.x;d.y2=cp.y;}else if(hi===3){d.x1=cp.x;d.y2=cp.y;}
      else if(hi===4){d.y1=cp.y;}else if(hi===5){d.x2=cp.x;}
      else if(hi===6){d.y2=cp.y;}else if(hi===7){d.x1=cp.x;}
      else{const dx=cp.x-(d.x1+d.x2)/2,dy=cp.y-(d.y1+d.y2)/2;d.x1+=dx;d.x2+=dx;d.y1+=dy;d.y2+=dy;}
    }
  }
  _tr(d,o,dx,dy){
    if(d.type==='trendline'){d.x1=o.x1+dx;d.y1=o.y1+dy;d.x2=o.x2+dx;d.y2=o.y2+dy;}
    else if(d.type==='path'){d.pts=o.pts.map(p=>({x:p.x+dx,y:p.y+dy}));}
    else if(d.type==='rect'){d.x1=o.x1+dx;d.y1=o.y1+dy;d.x2=o.x2+dx;d.y2=o.y2+dy;}
  }
  _del(){if(!this.selId)return;this._ph();this.D=this.D.filter(x=>x.id!==this.selId);this.selId=null;this.fut=[];this.mark();}
  _ph(){this.hist.push(JSON.stringify(this.D));if(this.hist.length>60)this.hist.shift();}
  undo(){if(!this.hist.length)return;this.fut.push(JSON.stringify(this.D));this.D=JSON.parse(this.hist.pop());this.selId=null;this.ds=null;this.mark();}
  redo(){if(!this.fut.length)return;this.hist.push(JSON.stringify(this.D));this.D=JSON.parse(this.fut.pop());this.selId=null;this.mark();}
  setTool(t){this.tool=t;this.ds=null;this.mark();}
  setColor(c){this.color=c;if(this.selId){const d=this.D.find(x=>x.id===this.selId);if(d)d.color=c;}this.mark();}
  serialise(){return JSON.stringify(this.D);}
  destroy(){cancelAnimationFrame(this._raf);window.removeEventListener('keydown',this._kfn);}
}

// Chart registry — keyed by canvas id
const DC={};
function makeChart(id,data){if(DC[id])return DC[id];const cv=document.getElementById(id);if(!cv)return null;const ch=new DChart(cv,data);DC[id]=ch;return ch;}
function killChart(id){if(DC[id]){DC[id].destroy();delete DC[id];}}
function getChart(id){return DC[id]||null;}

// ── Toolbar HTML ──────────────────────────────────────────────────
const TICONS={
  trendline:`<svg viewBox="0 0 22 22"><circle cx="3" cy="19" r="2.5" fill="currentColor" stroke="none"/><circle cx="19" cy="3" r="2.5" fill="currentColor" stroke="none"/><line x1="3" y1="19" x2="19" y2="3" stroke-width="1.7"/></svg>`,
  path:`<svg viewBox="0 0 22 22"><circle cx="3" cy="19" r="2.5" fill="currentColor" stroke="none"/><circle cx="11" cy="7" r="2.5" fill="currentColor" stroke="none"/><circle cx="19" cy="14" r="2.5" fill="currentColor" stroke="none"/><polyline points="3,19 11,7 19,14" fill="none" stroke-width="1.7"/></svg>`,
  rect:`<svg viewBox="0 0 22 22"><rect x="3" y="5" width="16" height="12" rx="1" fill="none" stroke-width="1.7"/><circle cx="3" cy="5" r="2" fill="currentColor" stroke="none"/><circle cx="19" cy="5" r="2" fill="currentColor" stroke="none"/><circle cx="19" cy="17" r="2" fill="currentColor" stroke="none"/><circle cx="3" cy="17" r="2" fill="currentColor" stroke="none"/></svg>`
};
const THINTS={
  trendline:'Tap to place start → tap to place end. Drag endpoints or line to adjust.',
  path:'Tap to add points. Double-tap or press Enter to finish. Drag any point.',
  rect:'Tap first corner → tap second corner. Drag handles to resize.'
};

function tbHTML(cid,compact){
  const s=compact?'style="width:30px;height:30px;border-radius:7px"':'';
  const btn=(t)=>`<button class="stb" ${s} id="tb${cid}${t}" onclick="cTool('${cid}','${t}')" title="${t}">${TICONS[t]}</button>`;
  return `${btn('trendline')}${btn('path')}${btn('rect')}
    <div class="stb-sep"></div>
    <input type="color" class="cpick" value="#ef5350" oninput="cColor('${cid}',this.value)" title="Color">
    <select class="swsel" onchange="cW('${cid}',+this.value)"><option value="1">1px</option><option value="2" selected>2px</option><option value="3">3px</option></select>
    <select class="swsel" onchange="cLS('${cid}',this.value)"><option value="solid">——</option><option value="dashed">- -</option><option value="dotted">···</option></select>
    <div class="stb-sep"></div>
    <button class="stb" ${s} onclick="cUndo('${cid}')" title="Undo Ctrl+Z"><svg viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M3 8h10a6 6 0 0 1 0 12H5"/><polyline points="3,4 3,8 7,8"/></svg></button>
    <button class="stb" ${s} onclick="cRedo('${cid}')" title="Redo"><svg viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M19 8H9a6 6 0 0 0 0 12h6"/><polyline points="19,4 19,8 15,8"/></svg></button>
    <button class="stb" ${s} onclick="cDel('${cid}')" title="Delete selected"><svg viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><polyline points="3,6 19,6"/><path d="M7 6V4h8v2M17 6l-1 13H6L5 6"/></svg></button>`;
}
// Compact toolbar for examples (same tools, smaller buttons)
function miniTbHTML(cid){return tbHTML(cid,true);}

// Global tool functions
function cTool(id,t){
  const ch=DC[id];if(!ch)return;
  ch.setTool(t);
  ['trendline','path','rect'].forEach(x=>{document.getElementById('tb'+id+x)?.classList.toggle('on',x===t);});
  const h=document.getElementById('hint'+id);if(h)h.textContent=THINTS[t]||'';
}
function cColor(id,c){DC[id]?.setColor(c);}
function cW(id,w){if(DC[id])DC[id].sw=w;}
function cLS(id,s){if(DC[id])DC[id].ls=s;}
function cUndo(id){DC[id]?.undo();}
function cRedo(id){DC[id]?.redo();}
function cDel(id){DC[id]?._del();}

// ── Main sketch tab ───────────────────────────────────────────────
function renderSketch(el){
  const cid='cm'+sel.id;
  const data=sec==='concepts'?sel.concept_sketch:sel.sketch;
  killChart(cid);
  el.innerHTML=`<div class="sketch-shell">
    <div class="sketch-tb">${tbHTML(cid,false)}</div>
    <canvas class="draw-canvas" id="${cid}"></canvas>
    <div class="sketch-hint" id="hint${cid}">${THINTS.trendline}</div>
  </div>`;
  requestAnimationFrame(()=>{
    const ch=makeChart(cid,data);
    if(ch){ch.setTool('trendline');document.getElementById('tb'+cid+'trendline')?.classList.add('on');}
  });
}

// Capture sketch before leaving tab
function captureSketch(){
  if(!sel)return;
  const cid='cm'+sel.id;
  const ch=DC[cid];if(!ch)return;
  if(sec==='concepts')sel.concept_sketch=ch.serialise();
  else sel.sketch=ch.serialise();
}

// ── Example sketches ──────────────────────────────────────────────
function initExSketch(i){
  const cid=`ec${sel.id}x${i}`;
  killChart(cid);
  const data=sel.examples[i]?.sketch||null;
  requestAnimationFrame(()=>{
    const ch=makeChart(cid,data);
    if(ch){ch.setTool('trendline');document.getElementById('tb'+cid+'trendline')?.classList.add('on');}
  });
}

// ─── SAVE ────────────────────────────────────────────────────────
async function saveEntry(){
  if(!sel)return;

  // Always capture main sketch (whether on sketch tab or not)
  const mainCid='cm'+sel.id;
  const mainCh=DC[mainCid];
  if(mainCh){
    if(sec==='concepts')sel.concept_sketch=mainCh.serialise();
    else sel.sketch=mainCh.serialise();
  }
  // Also capture if currently on sketch tab (belt + suspenders)
  if(docTab[sec]==='sketch')captureSketch();

  // Capture all example sketches
  if(sel.examples){
    sel.examples.forEach((ex,i)=>{
      const cid=`ec${sel.id}x${i}`;
      const ch=DC[cid];
      if(ch)ex.sketch=ch.serialise();
    });
  }

  const idx=store[sec].findIndex(x=>x.id===sel.id);
  if(idx>=0)store[sec][idx]=sel;
  await persist();
  renderList();
  toast('Saved ✓');
}

// ─── PWA INSTALL ─────────────────────────────────────────────────
let _installPrompt = null;

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  _installPrompt = e;
  // Show banner after 3s if not already installed
  setTimeout(() => {
    if (!window.matchMedia('(display-mode: standalone)').matches) {
      document.getElementById('installBar')?.classList.add('show');
    }
  }, 3000);
});

async function triggerInstall() {
  if (!_installPrompt) return;
  _installPrompt.prompt();
  const { outcome } = await _installPrompt.userChoice;
  if (outcome === 'accepted') {
    document.getElementById('installBar')?.classList.remove('show');
    toast('App installed! Find it on your home screen.');
  }
  _installPrompt = null;
}

function dismissInstall() {
  document.getElementById('installBar')?.classList.remove('show');
  sessionStorage.setItem('install-dismissed', '1');
}

window.addEventListener('appinstalled', () => {
  document.getElementById('installBar')?.classList.remove('show');
});

// Hide banner if already in standalone mode
if (window.matchMedia('(display-mode: standalone)').matches) {
  document.getElementById('installBar')?.classList.remove('show');
}

// ─── SERVICE WORKER ───────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js')
      .then(reg => {
        // Check for updates every 60s
        setInterval(() => reg.update(), 60000);
      })
      .catch(() => {});
  });
}

init();
