<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="theme-color" content="#f6f7f9">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Trading Knowledge Base</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f6f7f9;
  --card:#ffffff;
  --card2:#f0f2f5;
  --border:rgba(10,20,40,.08);
  --border-md:rgba(10,20,40,.13);
  --border-hi:rgba(10,20,40,.22);
  --text:#0f1623;
  --text2:#5a6478;
  --text3:#9aa3b2;
  --blue:#3b6ef0;
  --blue-lt:rgba(59,110,240,.09);
  --blue-bd:rgba(59,110,240,.28);
  --green:#18a06a;
  --green-lt:rgba(24,160,106,.09);
  --amber:#c97d1a;
  --amber-lt:rgba(201,125,26,.1);
  --red:#d94040;
  --red-lt:rgba(217,64,64,.09);
  --purple:#7253e0;
  --purple-lt:rgba(114,83,224,.09);
  --sans:'Inter',system-ui,sans-serif;
  --mono:'JetBrains Mono',ui-monospace,monospace;
  --sh0:0 1px 2px rgba(10,20,40,.05);
  --sh1:0 2px 8px rgba(10,20,40,.07),0 1px 2px rgba(10,20,40,.04);
  --sh2:0 6px 20px rgba(10,20,40,.09),0 2px 6px rgba(10,20,40,.05);
  --sh3:0 16px 40px rgba(10,20,40,.12),0 4px 12px rgba(10,20,40,.06);
  --r:8px;
  --r2:12px;
  --r3:16px;
}
html,body{height:100%;overflow:hidden;font-family:var(--sans);background:var(--bg);color:var(--text);font-size:14px;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent}

/* ── LAYOUT ── */
.app{display:flex;height:100vh;overflow:hidden}

/* ── NAV RAIL ── */
.rail{width:64px;flex-shrink:0;background:var(--card);border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center;padding:16px 0 12px;gap:4px;z-index:20;box-shadow:var(--sh0)}
.rail-logo{width:36px;height:36px;border-radius:10px;background:linear-gradient(145deg,#3b6ef0,#2249c8);display:flex;align-items:center;justify-content:center;margin-bottom:20px;box-shadow:0 4px 14px rgba(59,110,240,.35)}
.rail-logo svg{width:18px;height:18px;stroke:#fff;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.rail-btn{width:42px;height:42px;border-radius:11px;border:none;background:transparent;color:var(--text3);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;transition:all .16s;position:relative}
.rail-btn svg{width:19px;height:19px;stroke:currentColor;fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.rail-btn span{font-size:8.5px;font-weight:600;font-family:var(--mono);text-transform:uppercase;letter-spacing:.04em;line-height:1}
.rail-btn:hover{background:var(--bg);color:var(--text2)}
.rail-btn.on{background:var(--blue-lt);color:var(--blue)}
.rail-btn.on::before{content:'';position:absolute;left:-16px;top:50%;transform:translateY(-50%);width:3px;height:22px;border-radius:0 4px 4px 0;background:var(--blue)}
.rail-sep{width:28px;height:1px;background:var(--border);margin:8px 0}
.rail-tip{display:none}

/* ── SIDEBAR ── */
.sidebar{width:256px;flex-shrink:0;background:var(--card);border-right:1px solid var(--border);display:flex;flex-direction:column;transition:transform .26s cubic-bezier(.22,.8,.2,1);z-index:30}
.sb-top{padding:18px 14px 12px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:10px}
.sb-toprow{display:flex;align-items:center;justify-content:space-between}
.sb-section{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;font-family:var(--mono)}
.sb-actions{display:flex;gap:6px;align-items:center}
.sb-close-btn{display:none;width:26px;height:26px;border-radius:7px;border:none;background:var(--bg);color:var(--text2);cursor:pointer;align-items:center;justify-content:center}
.sb-close-btn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2.2}
.new-btn{height:30px;padding:0 12px;border-radius:8px;border:1px solid var(--blue-bd);background:var(--blue-lt);color:var(--blue);font-size:11.5px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .14s;white-space:nowrap}
.new-btn svg{width:11px;height:11px;stroke:currentColor;fill:none;stroke-width:2.5}
.new-btn:hover{background:rgba(59,110,240,.15);box-shadow:var(--sh1)}
.sb-search{width:100%;padding:8px 11px;border-radius:9px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:12.5px;outline:none;font-family:var(--sans);transition:all .14s}
.sb-search::placeholder{color:var(--text3)}
.sb-search:focus{border-color:var(--blue-bd);background:var(--card);box-shadow:var(--sh0)}
/* Mobile section pills */
.mob-pills{display:none;gap:5px;flex-wrap:wrap;padding-bottom:10px;border-bottom:1px solid var(--border)}
.mob-pill{padding:6px 11px;border-radius:8px;border:1px solid var(--border-md);background:var(--bg);color:var(--text2);font-size:11px;font-weight:700;font-family:var(--mono);cursor:pointer;transition:all .14s}
.mob-pill.on{background:var(--blue);color:#fff;border-color:var(--blue);box-shadow:0 2px 8px rgba(59,110,240,.3)}
.sb-list{flex:1;overflow-y:auto;padding:10px}
.sb-empty{padding:32px 12px;text-align:center;font-size:12.5px;color:var(--text3);line-height:1.75}
/* Entry cards in sidebar */
.sb-card{padding:11px 13px;border-radius:10px;cursor:pointer;margin-bottom:7px;border:1px solid var(--border);background:var(--card);box-shadow:var(--sh0);transition:all .14s}
.sb-card:hover{box-shadow:var(--sh1);transform:translateY(-1px);border-color:var(--border-md)}
.sb-card.sel{border-color:var(--blue-bd);background:var(--blue-lt);box-shadow:var(--sh1)}
.sc-title{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sc-sub{font-size:11px;color:var(--text3);margin-top:3px;font-family:var(--mono);display:flex;align-items:center;gap:6px}
.sc-tag{padding:2px 7px;border-radius:6px;font-size:10px;font-weight:600;font-family:var(--mono)}

/* ── MAIN ── */
.main{flex:1;overflow:hidden;display:flex;flex-direction:column;background:var(--bg)}

/* Empty state */
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:40px 24px;text-align:center}
.empty-icon{width:60px;height:60px;border-radius:18px;background:var(--blue-lt);display:flex;align-items:center;justify-content:center;margin:0 auto}
.empty-icon svg{width:28px;height:28px;stroke:var(--blue);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.empty-state h2{font-size:18px;font-weight:700;color:var(--text);letter-spacing:-.015em}
.empty-state p{font-size:13px;color:var(--text2);max-width:320px;line-height:1.75}
.empty-cta{padding:10px 22px;border-radius:10px;background:var(--blue);color:#fff;font-size:13px;font-weight:700;border:none;cursor:pointer;box-shadow:0 4px 14px rgba(59,110,240,.35);transition:all .15s}
.empty-cta:hover{background:#2f5fd6;box-shadow:0 6px 18px rgba(59,110,240,.4)}

/* ── DOC VIEW ── */
.doc{flex:1;display:flex;flex-direction:column;overflow:hidden}
.doc-header{padding:20px 24px 0;background:var(--card);border-bottom:1px solid var(--border);flex-shrink:0}
.doc-title-row{display:flex;align-items:flex-start;gap:12px;margin-bottom:16px}
.doc-title{flex:1;font-size:20px;font-weight:800;background:transparent;border:none;color:var(--text);outline:none;letter-spacing:-.02em;font-family:var(--sans);line-height:1.2;resize:none;min-height:28px;overflow:hidden}
.doc-title::placeholder{color:var(--text3)}
.doc-badge{padding:4px 11px;border-radius:20px;font-size:10.5px;font-weight:700;font-family:var(--mono);text-transform:uppercase;letter-spacing:.05em;border:none;cursor:pointer;outline:none;transition:all .14s;white-space:nowrap;margin-top:4px}
.badge-model{background:var(--blue-lt);color:var(--blue);border:1px solid var(--blue-bd)}
.badge-concept{background:var(--purple-lt);color:var(--purple);border:1px solid rgba(114,83,224,.25)}
.badge-rules{background:var(--green-lt);color:var(--green);border:1px solid rgba(24,160,106,.25)}
.doc-tabs{display:flex;gap:0;padding:0 24px;background:var(--card)}
.dtab{padding:10px 16px;font-size:11.5px;font-weight:600;color:var(--text3);cursor:pointer;border:none;background:transparent;border-bottom:2.5px solid transparent;margin-bottom:-1px;transition:all .14s;font-family:var(--mono);text-transform:uppercase;letter-spacing:.05em}
.dtab:hover{color:var(--text2)}
.dtab.on{color:var(--blue);border-bottom-color:var(--blue)}
.doc-body{flex:1;overflow-y:auto;display:flex;flex-direction:column}
.doc-footer{padding:10px 24px;border-top:1px solid var(--border);background:var(--card);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.footer-date{font-size:11px;color:var(--text3);font-family:var(--mono)}
.footer-btns{display:flex;gap:8px}
.btn-del{padding:7px 14px;border-radius:9px;border:1px solid rgba(217,64,64,.25);background:transparent;color:var(--red);font-size:12px;font-weight:600;cursor:pointer;transition:all .14s}
.btn-del:hover{background:var(--red-lt);border-color:rgba(217,64,64,.4)}
.btn-save{padding:7px 20px;border-radius:9px;background:var(--blue);color:#fff;font-size:12px;font-weight:700;border:none;cursor:pointer;box-shadow:0 2px 8px rgba(59,110,240,.3);transition:all .14s}
.btn-save:hover{background:#2f5fd6;box-shadow:0 4px 14px rgba(59,110,240,.4)}

/* ── TAB: OVERVIEW ── */
.overview-panel{padding:24px;display:flex;flex-direction:column;gap:16px}
.field-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:16px 18px;box-shadow:var(--sh0);transition:box-shadow .14s,border-color .14s}
.field-card:focus-within{box-shadow:var(--sh1);border-color:var(--blue-bd)}
.field-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--text3);font-family:var(--mono);margin-bottom:8px}
.field-input{width:100%;background:transparent;border:none;outline:none;color:var(--text);font-size:13.5px;line-height:1.75;font-family:var(--sans);resize:none;min-height:52px}
.field-input::placeholder{color:var(--text3)}
.field-input-inline{width:100%;background:transparent;border:none;outline:none;color:var(--text);font-size:13.5px;font-family:var(--sans)}
.field-input-inline::placeholder{color:var(--text3)}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
@media(max-width:600px){.two-col,.three-col{grid-template-columns:1fr}}

/* ── TAB: SKETCH ── */
.sketch-wrap{display:flex;flex-direction:column;height:100%;min-height:0}
.sketch-tb{padding:8px 14px;border-bottom:1px solid var(--border);background:var(--card);display:flex;align-items:center;gap:4px;flex-wrap:wrap;flex-shrink:0}
.stb{width:36px;height:36px;border-radius:9px;border:1px solid transparent;background:transparent;cursor:pointer;color:var(--text3);display:flex;align-items:center;justify-content:center;transition:all .12s;flex-shrink:0}
.stb svg{width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
.stb:hover{background:var(--bg);color:var(--text2);border-color:var(--border)}
.stb.on{background:var(--blue-lt);color:var(--blue);border-color:var(--blue-bd)}
.stb-sep{width:1px;height:22px;background:var(--border);margin:0 4px}
.s-cpick{width:28px;height:28px;border-radius:7px;border:1px solid var(--border-md);cursor:pointer;padding:0;flex-shrink:0}
.s-wsel{background:var(--bg);border:1px solid var(--border);color:var(--text2);font-size:11px;padding:5px 7px;border-radius:7px;cursor:pointer;outline:none;font-family:var(--mono)}
.s-wsel option{background:var(--card)}
.sketch-hint{font-size:11px;color:var(--text3);padding:5px 14px;background:var(--card);border-top:1px solid var(--border);flex-shrink:0;font-family:var(--mono)}
svg.draw-svg{flex:1;display:block;width:100%;background:#fafbfc;cursor:crosshair;min-height:0;touch-action:none}
/* node handles rendered as SVG circles — styled via attrs, no CSS needed */

/* ── TAB: RULES ── */
.rules-panel{padding:20px 24px;display:flex;flex-direction:column;gap:10px}
.rules-intro{font-size:13px;color:var(--text2);line-height:1.7;background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:14px 16px;box-shadow:var(--sh0)}
.rules-intro textarea{width:100%;background:transparent;border:none;outline:none;color:var(--text2);font-size:13px;line-height:1.75;font-family:var(--sans);resize:none;min-height:40px}
.rules-intro textarea::placeholder{color:var(--text3)}
.rule-item{display:flex;align-items:flex-start;gap:10px;background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:12px 14px;box-shadow:var(--sh0);transition:all .14s}
.rule-item:hover{box-shadow:var(--sh1);border-color:var(--border-md)}
.rule-num{width:26px;height:26px;border-radius:7px;background:var(--blue-lt);border:1px solid var(--blue-bd);color:var(--blue);font-size:11px;font-weight:700;font-family:var(--mono);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.rule-inp{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-size:13.5px;line-height:1.6;font-family:var(--sans);resize:none;min-height:24px}
.rule-inp::placeholder{color:var(--text3)}
.rule-rm{width:26px;height:26px;border-radius:7px;border:none;background:transparent;color:var(--text3);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;transition:color .12s}
.rule-rm svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2}
.rule-rm:hover{color:var(--red)}
.add-rule-btn{display:flex;align-items:center;gap:7px;padding:10px 14px;border-radius:var(--r2);border:1.5px dashed var(--border-md);background:transparent;color:var(--text3);font-size:12.5px;font-weight:600;cursor:pointer;transition:all .14s;align-self:flex-start}
.add-rule-btn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2.4}
.add-rule-btn:hover{border-color:var(--blue-bd);color:var(--blue);background:var(--blue-lt)}

/* ── TAB: EXAMPLES ── */
.examples-panel{padding:20px 24px;display:flex;flex-direction:column;gap:14px}
.ex-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;box-shadow:var(--sh0)}
.ex-card-head{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:var(--card)}
.ex-card-num{font-size:10.5px;font-weight:700;color:var(--text3);font-family:var(--mono);text-transform:uppercase;letter-spacing:.06em}
.ex-del{width:26px;height:26px;border-radius:7px;border:none;background:transparent;color:var(--text3);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:color .12s}
.ex-del svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2}
.ex-del:hover{color:var(--red)}
.ex-body{padding:14px 16px;display:flex;flex-direction:column;gap:10px}
.ex-desc{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;color:var(--text);font-size:13px;line-height:1.7;font-family:var(--sans);resize:none;min-height:60px;outline:none;transition:border-color .14s}
.ex-desc:focus{border-color:var(--blue-bd);background:var(--card)}
.ex-desc::placeholder{color:var(--text3)}
.ex-sketch-area{border:1px solid var(--border);border-radius:var(--r);overflow:hidden;background:#fafbfc}
.ex-sketch-tb{padding:6px 10px;border-bottom:1px solid var(--border);background:var(--card);display:flex;gap:3px;align-items:center;flex-wrap:wrap}
svg.ex-draw-svg{display:block;width:100%;height:220px;background:#fafbfc;cursor:crosshair;touch-action:none}
.add-ex-btn{display:flex;align-items:center;gap:7px;padding:12px 16px;border-radius:var(--r2);border:1.5px dashed var(--border-md);background:transparent;color:var(--text3);font-size:12.5px;font-weight:600;cursor:pointer;transition:all .14s;align-self:flex-start}
.add-ex-btn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2.4}
.add-ex-btn:hover{border-color:var(--blue-bd);color:var(--blue);background:var(--blue-lt)}

/* ── TAB: CONCEPT NOTE ── */
.concept-panel{padding:24px;display:flex;flex-direction:column;gap:14px}
.concept-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:18px 20px;box-shadow:var(--sh0);transition:box-shadow .14s,border-color .14s}
.concept-card:focus-within{box-shadow:var(--sh1);border-color:var(--blue-bd)}
.concept-ta{width:100%;background:transparent;border:none;outline:none;color:var(--text);font-size:14px;line-height:1.85;font-family:var(--sans);resize:none;min-height:200px}
.concept-ta::placeholder{color:var(--text3)}

/* ── MOBILE ── */
.mob-trigger{display:none;position:fixed;top:12px;left:12px;z-index:50;width:40px;height:40px;border-radius:11px;background:var(--card);border:1px solid var(--border-md);box-shadow:var(--sh2);align-items:center;justify-content:center;cursor:pointer}
.mob-trigger svg{width:18px;height:18px;stroke:var(--text);fill:none;stroke-width:1.9;stroke-linecap:round}
.scrim{display:none;position:fixed;inset:0;background:rgba(10,20,40,.3);backdrop-filter:blur(2px);z-index:25;opacity:0;transition:opacity .22s}
.scrim.open{display:block;opacity:1}

@media(max-width:768px){
  .mob-trigger{display:flex}
  .rail{display:none}
  .sidebar{position:fixed;inset:0 auto 0 0;transform:translateX(-100%);width:82vw;max-width:300px;box-shadow:var(--sh3)}
  .sidebar.open{transform:translateX(0)}
  .sb-close-btn{display:flex}
  .mob-pills{display:flex}
  .doc-header{padding-top:58px}
  .doc-tabs{padding:0 14px}
  .overview-panel,.concept-panel,.rules-panel,.examples-panel{padding:16px}
  .doc-footer{padding:10px 16px}
  .two-col,.three-col{grid-template-columns:1fr}
}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(6px);background:var(--text);color:#fff;font-size:12px;font-weight:600;padding:9px 20px;border-radius:24px;opacity:0;transition:all .22s cubic-bezier(.2,.8,.2,1);pointer-events:none;z-index:999;box-shadow:var(--sh3);font-family:var(--mono);letter-spacing:.01em}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border-md);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--border-hi)}
</style>
</head>
<body>

<!-- Mobile hamburger -->
<button class="mob-trigger" id="mobTrigger" onclick="openSidebar()">
  <svg viewBox="0 0 22 22"><line x1="2" y1="6" x2="20" y2="6"/><line x1="2" y1="11" x2="20" y2="11"/><line x1="2" y1="16" x2="20" y2="16"/></svg>
</button>
<div class="scrim" id="scrim" onclick="closeSidebar()"></div>

<div class="app">

  <!-- Rail -->
  <nav class="rail" id="rail">
    <div class="rail-logo">
      <svg viewBox="0 0 22 22"><polyline points="2,16 6,8 10,12 14,5 18,8"/><polyline points="15,5 18,5 18,8"/></svg>
    </div>
    <button class="rail-btn on" data-sec="models" onclick="switchSec('models',this)">
      <svg viewBox="0 0 22 22"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="12" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="12" width="7" height="7" rx="1.5"/><rect x="12" y="12" width="7" height="7" rx="1.5"/></svg>
      <span>Models</span>
    </button>
    <button class="rail-btn" data-sec="concepts" onclick="switchSec('concepts',this)">
      <svg viewBox="0 0 22 22"><path d="M11 2a6 6 0 0 1 6 6c0 3-2 5-2 7H7c0-2-2-4-2-7a6 6 0 0 1 6-6z"/><line x1="8" y1="19" x2="14" y2="19"/><line x1="9" y1="21" x2="13" y2="21"/></svg>
      <span>Concepts</span>
    </button>
    <button class="rail-btn" data-sec="rules" onclick="switchSec('rules',this)">

<script>
// ─── IndexedDB ───────────────────────────────────────────────────
let db;
function openDB(){
  return new Promise((res,rej)=>{
    const req=indexedDB.open('tkb1',1);
    req.onupgradeneeded=e=>e.target.result.createObjectStore('data',{keyPath:'key'});
    req.onsuccess=e=>{db=e.target.result;res()};
    req.onerror=rej;
  });
}
function dbGet(k){return new Promise((res,rej)=>{const r=db.transaction('data','readonly').objectStore('data').get(k);r.onsuccess=e=>res(e.target.result?.value??null);r.onerror=rej})}
function dbSet(k,v){return new Promise((res,rej)=>{const tx=db.transaction('data','readwrite');tx.objectStore('data').put({key:k,value:v});tx.oncomplete=res;tx.onerror=rej})}

// ─── State ───────────────────────────────────────────────────────
let sec='models';
let store={models:[],concepts:[],rules:[]};
let sel=null;
let activeDocTab={models:'overview',concepts:'concept',rules:'rules'};
// per-entry active example sketch tool tracking
let activeSketches={};

const SEC_LABELS={models:'Models',concepts:'Concepts',rules:'Rules'};
const SEC_COLORS={models:'badge-model',concepts:'badge-concept',rules:'badge-rules'};

const TABS={
  models:[{id:'overview',label:'Overview'},{id:'sketch',label:'Sketch'},{id:'examples',label:'Examples'}],
  concepts:[{id:'concept',label:'Notes'},{id:'sketch',label:'Sketch'}],
  rules:[{id:'rules',label:'Rules'}]
};

// ─── Init ────────────────────────────────────────────────────────
async function init(){
  await openDB();
  for(const k of Object.keys(store)){
    try{const v=await dbGet('tkb-'+k);if(v)store[k]=JSON.parse(v);}catch(e){}
  }
  renderMobPills();
  renderList();
}

async function persist(){
  await dbSet('tkb-'+sec,JSON.stringify(store[sec]));
}

function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),1800);
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

// ─── Navigation ──────────────────────────────────────────────────
function switchSec(s,btn){
  sec=s;sel=null;
  document.querySelectorAll('.rail-btn').forEach(b=>b.classList.toggle('on',b.dataset.sec===s));
  document.getElementById('sbSecLabel').textContent=SEC_LABELS[s];
  document.getElementById('sbSearch').value='';
  renderMobPills();renderList();renderMain();
}

function renderMobPills(){
  const el=document.getElementById('mobPills');
  el.innerHTML=Object.keys(SEC_LABELS).map(k=>
    `<button class="mob-pill ${k===sec?'on':''}" onclick="switchSecMob('${k}')">${SEC_LABELS[k]}</button>`
  ).join('');
}
function switchSecMob(s){
  sec=s;sel=null;
  document.querySelectorAll('.rail-btn').forEach(b=>b.classList.toggle('on',b.dataset.sec===s));

}

// ─── Sidebar open/close (mobile) ─────────────────────────────────

}

// ─── Sidebar list ────────────────────────────────────────────────
function renderList(filter=''){
  const el=document.getElementById('sbList');

    <div class="sb-card ${sel&&sel.id===it.id?'sel':''}" onclick="selectEntry(${it.id})">

}
function filterList(v){renderList(v)}

function selectEntry(id){
  sel=store[sec].find(x=>x.id===id)||null;

  persist();renderList();renderMain();

async function deleteEntry(){
  if(!sel||!confirm('Delete this entry?'))return;

}

// ─── Main area ───────────────────────────────────────────────────
function renderMain(){
  const el=document.getElementById('mainArea');

    el.innerHTML=`<div class="empty-state">

      </div>
      <h2>${SEC_LABELS[sec]}</h2>
      <p>${{models:'Select a model or create a new one to start documenting your setup.',concepts:'Select a concept or create a new one to document your foundational ideas.',rules:'Select a rule set or create a new one to write and refine your trading rules.'}[sec]}</p>
      <button class="empty-cta" onclick="newEntry()">New ${SEC_LABELS[sec].slice(0,-1)}</button>
    </div>`;return;
  }
  const tabs=TABS[sec];
  const ct=activeDocTab[sec]||tabs[0].id;
  el.innerHTML=`
  <div class="doc">
    <div class="doc-header">
      <div class="doc-title-row">
        <textarea class="doc-title" id="docTitle" rows="1" placeholder="${sec==='models'?'Model name…':sec==='concepts'?'Concept name…':'Rule set name…'}" oninput="sel.title=this.value;autoResize(this);renderList()">${esc(sel.title)}</textarea>
        <span class="doc-badge ${SEC_COLORS[sec]}">${sec==='models'?'Model':sec==='concepts'?'Concept':'Rules'}</span>
      </div>
    </div>
    <div class="doc-tabs">
      ${tabs.map(t=>`<button class="dtab ${ct===t.id?'on':''}" onclick="switchDocTab('${t.id}',this)">${t.label}</button>`).join('')}
    </div>
    <div class="doc-body" id="docBody"></div>
    <div class="doc-footer">
      <span class="footer-date">${sel.date}</span>
      <div class="footer-btns">
        <button class="btn-del" onclick="deleteEntry()">Delete</button>
        <button class="btn-save" onclick="saveEntry()">Save</button>
      </div>
    </div>
  </div>`;
  renderDocBody(ct);
  setTimeout(()=>{const t=document.getElementById('docTitle');if(t)autoResize(t)},0);
}

function autoResize(el){el.style.height='auto';el.style.height=el.scrollHeight+'px'}

function switchDocTab(t,btn){
  activeDocTab[sec]=t;
  document.querySelectorAll('.dtab').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');

function renderDocBody(t){
  const el=document.getElementById('docBody');if(!el)return;
  const renders={
    overview:()=>renderOverview(el),

  (renders[t]||renders.overview)();
}

// ─── OVERVIEW (Models) ───────────────────────────────────────────
function renderOverview(el){

    <div class="field-card">

// ─── CONCEPT (Concepts) ──────────────────────────────────────────
function renderConcept(el){
  el.innerHTML=`<div class="concept-panel">
    <div class="concept-card">
      <div class="field-label" style="margin-bottom:10px">Concept notes</div>

Don't copy from books — write it the way you understand it. The goal is that when you re-read this tomorrow, it instantly clicks." oninput="sel.concept_notes=this.value">${esc(sel.concept_notes)}</textarea>

// ─── DRAWING ENGINE ──────────────────────────────────────────────
// Shared by main sketch and each example canvas.
// Tools: path (tap to add nodes, lift and re-tap to continue),
//        trendline (2 nodes, drag either endpoint),
//        rect (drag to draw, drag any of 4 corners to resize).
// Nodes are always visible and draggable. No arrowheads.

const NODE_R = 7;       // hit radius for touch (larger = easier to grab)
const NODE_VISUAL_R = 5; // visual radius of handle circle

// Shape store per canvas id: { shapes:[], tool, color, strokeW }
const canvasState = {};

function getCS(id) {
  if (!canvasState[id]) canvasState[id] = { shapes: [], tool: 'path', color: '#3b6ef0', strokeW: 2 };
  return canvasState[id];
}

// ── Serialise / deserialise (we store shapes as JSON not SVG innerHTML) ──
function serialiseCanvas(id) {
  return JSON.stringify(getCS(id).shapes);
}
function deserialiseCanvas(id, json) {
  try { getCS(id).shapes = json ? JSON.parse(json) : []; } catch { getCS(id).shapes = []; }
}

// ── Render all shapes onto an SVG element ──────────────────────────
function renderCanvas(id) {
  const svgEl = document.getElementById(id);
  if (!svgEl) return;
  const cs = getCS(id);
  // clear non-grid children
  [...svgEl.children].forEach(c => { if (!c.classList.contains('sk-grid') && !c.classList.contains('ex-grid')) c.remove(); });

  cs.shapes.forEach((sh, si) => {
    if (sh.type === 'path') {
      if (sh.pts.length < 2) return;
      const path = mkEl('polyline');
      path.setAttribute('points', sh.pts.map(p => `${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' '));
      path.setAttribute('fill', 'none');
      path.setAttribute('stroke', sh.color);
      path.setAttribute('stroke-width', sh.strokeW);
      path.setAttribute('stroke-linecap', 'round');
      path.setAttribute('stroke-linejoin', 'round');
      svgEl.appendChild(path);
      // nodes
      sh.pts.forEach((p, pi) => {
        const c = makeNode(p.x, p.y, sh.color, id, si, pi);
        svgEl.appendChild(c);
      });
    } else if (sh.type === 'trendline') {
      const line = mkEl('line');
      line.setAttribute('x1', sh.x1); line.setAttribute('y1', sh.y1);
      line.setAttribute('x2', sh.x2); line.setAttribute('y2', sh.y2);
      line.setAttribute('stroke', sh.color);
      line.setAttribute('stroke-width', sh.strokeW);
      line.setAttribute('stroke-linecap', 'round');
      svgEl.appendChild(line);
      // 2 endpoint nodes
      [[sh.x1, sh.y1, 0], [sh.x2, sh.y2, 1]].forEach(([x, y, ni]) => {
        svgEl.appendChild(makeNode(x, y, sh.color, id, si, ni));
      });
    } else if (sh.type === 'rect') {
      const rx = Math.min(sh.x1, sh.x2), ry = Math.min(sh.y1, sh.y2);
      const rw = Math.abs(sh.x2 - sh.x1), rh = Math.abs(sh.y2 - sh.y1);
      const rect = mkEl('rect');
      rect.setAttribute('x', rx); rect.setAttribute('y', ry);
      rect.setAttribute('width', rw); rect.setAttribute('height', rh);
      rect.setAttribute('fill', sh.color); rect.setAttribute('fill-opacity', '0.08');
      rect.setAttribute('stroke', sh.color); rect.setAttribute('stroke-width', sh.strokeW);
      svgEl.appendChild(rect);
      // 4 corner nodes: TL, TR, BR, BL
      [[sh.x1,sh.y1,0],[sh.x2,sh.y1,1],[sh.x2,sh.y2,2],[sh.x1,sh.y2,3]].forEach(([x,y,ni]) => {
        svgEl.appendChild(makeNode(x, y, sh.color, id, si, ni));
      });
    }
  });
}

function makeNode(x, y, color, canvasId, shapeIdx, nodeIdx) {
  const c = mkEl('circle');
  c.setAttribute('cx', x); c.setAttribute('cy', y); c.setAttribute('r', NODE_VISUAL_R);
  c.setAttribute('fill', '#fff'); c.setAttribute('stroke', color); c.setAttribute('stroke-width', 2);
  c.setAttribute('data-canvas', canvasId);
  c.setAttribute('data-si', shapeIdx); c.setAttribute('data-ni', nodeIdx);
  c.style.cursor = 'move';
  return c;
}

// ── Drag state ────────────────────────────────────────────────────
let drag = null; // { canvasId, si, ni, offX, offY }
let drawState = null; // active drawing in progress

// ── Get pointer position relative to SVG ─────────────────────────
function getPt(svgEl, e) {
  const r = svgEl.getBoundingClientRect();
  const src = e.touches ? e.touches[0] : e;
  return { x: (src.clientX - r.left), y: (src.clientY - r.top) };
}

// ── Hit-test: is tap on a node handle? ───────────────────────────
function hitNode(svgEl, p) {
  const nodes = svgEl.querySelectorAll('circle[data-si]');
  for (const n of nodes) {
    const cx = parseFloat(n.getAttribute('cx'));
    const cy = parseFloat(n.getAttribute('cy'));
    const dist = Math.hypot(p.x - cx, p.y - cy);
    if (dist <= NODE_R + 4) return n;
  }
  return null;
}

// ── Attach events to a canvas SVG ────────────────────────────────
function attachCanvas(svgEl, csId) {
  // Touch
  svgEl.addEventListener('touchstart', e => { e.preventDefault(); canvasPointerDown(svgEl, csId, e); }, { passive: false });
  svgEl.addEventListener('touchmove', e => { e.preventDefault(); canvasPointerMove(svgEl, csId, e); }, { passive: false });
  svgEl.addEventListener('touchend', e => { e.preventDefault(); canvasPointerUp(svgEl, csId, e); }, { passive: false });
  // Mouse
  svgEl.addEventListener('mousedown', e => canvasPointerDown(svgEl, csId, e));
  svgEl.addEventListener('mousemove', e => canvasPointerMove(svgEl, csId, e));
  svgEl.addEventListener('mouseup', e => canvasPointerUp(svgEl, csId, e));
}

function canvasPointerDown(svgEl, csId, e) {
  if (e.button !== undefined && e.button !== 0) return;
  const p = getPt(svgEl, e);
  const cs = getCS(csId);

  // Check if tapping an existing node handle
  const node = hitNode(svgEl, p);
  if (node) {
    drag = {
      canvasId: csId,
      si: parseInt(node.getAttribute('data-si')),
      ni: parseInt(node.getAttribute('data-ni'))
    };
    return;
  }

  // Start a new shape
  const { tool, color, strokeW } = cs;

  if (tool === 'path') {
    if (drawState && drawState.tool === 'path' && drawState.csId === csId) {
      // continuing existing path — add another node
      drawState.sh.pts.push({ x: p.x, y: p.y });
      renderCanvas(csId);
    } else {
      // start a brand new path
      const sh = { type: 'path', color, strokeW, pts: [{ x: p.x, y: p.y }, { x: p.x, y: p.y }] };
      cs.shapes.push(sh);
      drawState = { tool: 'path', csId, sh, live: true };
      renderCanvas(csId);
    }
  } else if (tool === 'trendline') {
    if (drawState && drawState.tool === 'trendline' && drawState.csId === csId && drawState.phase === 1) {
      // second tap — finalise
      drawState.sh.x2 = p.x; drawState.sh.y2 = p.y;
      drawState = null;
      renderCanvas(csId);
    } else {
      // first tap — place start node
      const sh = { type: 'trendline', color, strokeW, x1: p.x, y1: p.y, x2: p.x, y2: p.y };
      cs.shapes.push(sh);
      drawState = { tool: 'trendline', csId, sh, phase: 1 };
      renderCanvas(csId);
    }
  } else if (tool === 'rect') {
    if (drawState && drawState.tool === 'rect' && drawState.csId === csId && drawState.phase === 1) {
      // second tap — finalise
      drawState.sh.x2 = p.x; drawState.sh.y2 = p.y;
      drawState = null;
      renderCanvas(csId);
    } else {
      const sh = { type: 'rect', color, strokeW, x1: p.x, y1: p.y, x2: p.x, y2: p.y };
      cs.shapes.push(sh);
      drawState = { tool: 'rect', csId, sh, phase: 1 };
      renderCanvas(csId);
    }
  }
}

function canvasPointerMove(svgEl, csId, e) {
  const p = getPt(svgEl, e);

  // Dragging a node handle
  if (drag && drag.canvasId === csId) {
    const cs = getCS(csId);
    const sh = cs.shapes[drag.si];
    if (!sh) return;
    if (sh.type === 'path') {
      sh.pts[drag.ni] = { x: p.x, y: p.y };
    } else if (sh.type === 'trendline') {
      if (drag.ni === 0) { sh.x1 = p.x; sh.y1 = p.y; }
      else { sh.x2 = p.x; sh.y2 = p.y; }
    } else if (sh.type === 'rect') {
      // corners: 0=TL 1=TR 2=BR 3=BL
      if (drag.ni === 0) { sh.x1 = p.x; sh.y1 = p.y; }
      else if (drag.ni === 1) { sh.x2 = p.x; sh.y1 = p.y; }
      else if (drag.ni === 2) { sh.x2 = p.x; sh.y2 = p.y; }
      else if (drag.ni === 3) { sh.x1 = p.x; sh.y2 = p.y; }
    }
    renderCanvas(csId);
    return;
  }

  // Live preview while placing second point
  if (drawState && drawState.csId === csId) {
    const sh = drawState.sh;
    if (drawState.tool === 'path' && drawState.live) {
      sh.pts[sh.pts.length - 1] = { x: p.x, y: p.y };
      renderCanvas(csId);
    } else if (drawState.tool === 'trendline' && drawState.phase === 1) {
      sh.x2 = p.x; sh.y2 = p.y;
      renderCanvas(csId);
    } else if (drawState.tool === 'rect' && drawState.phase === 1) {
      sh.x2 = p.x; sh.y2 = p.y;
      renderCanvas(csId);
    }
  }
}

function canvasPointerUp(svgEl, csId, e) {
  if (drag) {
    drag = null;
    return;
  }
  // For path tool — on finger lift, the last preview node becomes a fixed node.
  // The user can tap again to add the next node, or switch tools to stop.
  if (drawState && drawState.csId === csId && drawState.tool === 'path' && drawState.live) {
    // freeze the live node — next tap will add another
    drawState.live = false;
    renderCanvas(csId);
  }
}

// ── Undo last shape ───────────────────────────────────────────────
function undoShape(csId) {
  const cs = getCS(csId);
  if (drawState && drawState.csId === csId) drawState = null;
  cs.shapes.pop();
  renderCanvas(csId);
}

// ── Clear canvas ──────────────────────────────────────────────────
function clearCanvas(csId) {
  if (!confirm('Clear this sketch?')) return;
  drawState = null;
  getCS(csId).shapes = [];
  renderCanvas(csId);
}

// ── Finish path (stop adding nodes) ──────────────────────────────
function finishPath(csId) {
  if (drawState && drawState.csId === csId && drawState.tool === 'path') {
    // Remove the trailing preview point if no second actual tap happened
    const sh = drawState.sh;
    if (sh.pts.length > 1) sh.pts.pop();
    drawState = null;
    renderCanvas(csId);
  }
}

// ── Grid ─────────────────────────────────────────────────────────
function drawGrid(svgEl, clsName, step) {
  if (svgEl.querySelector('.' + clsName)) return;
  const g = mkEl('g'); g.setAttribute('class', clsName);
  const W = svgEl.clientWidth || 800, H = svgEl.clientHeight || 400;
  for (let x = 0; x <= W; x += step) g.appendChild(gridLine(x, 0, x, H));
  for (let y = 0; y <= H; y += step) g.appendChild(gridLine(0, y, W, y));
  svgEl.prepend(g);
}
function gridLine(x1, y1, x2, y2) {
  const l = mkEl('line');
  l.setAttribute('x1', x1); l.setAttribute('y1', y1);
  l.setAttribute('x2', x2); l.setAttribute('y2', y2);
  l.setAttribute('stroke', 'rgba(10,20,40,.045)'); l.setAttribute('stroke-width', '0.5');
  return l;
}
function mkEl(tag) { return document.createElementNS('http://www.w3.org/2000/svg', tag); }
function setAtt(el, attrs) { for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, v); }

// ── Toolbar HTML helpers ──────────────────────────────────────────
const TOOL_ICONS = {
  path: `<svg viewBox="0 0 22 22"><circle cx="4" cy="18" r="2" fill="currentColor" stroke="none"/><circle cx="11" cy="6" r="2" fill="currentColor" stroke="none"/><circle cx="18" cy="14" r="2" fill="currentColor" stroke="none"/><polyline points="4,18 11,6 18,14" stroke-width="1.6" fill="none"/></svg>`,
  trendline: `<svg viewBox="0 0 22 22"><circle cx="3" cy="18" r="2.2" fill="currentColor" stroke="none"/><circle cx="19" cy="4" r="2.2" fill="currentColor" stroke="none"/><line x1="3" y1="18" x2="19" y2="4" stroke-width="1.6"/></svg>`,
  rect: `<svg viewBox="0 0 22 22"><rect x="3" y="6" width="16" height="10" rx="1" stroke-width="1.6" fill="none"/><circle cx="3" cy="6" r="2" fill="currentColor" stroke="none"/><circle cx="19" cy="6" r="2" fill="currentColor" stroke="none"/><circle cx="19" cy="16" r="2" fill="currentColor" stroke="none"/><circle cx="3" cy="16" r="2" fill="currentColor" stroke="none"/></svg>`
};
const TOOL_HINTS = {
  path: 'Path — tap to place nodes. Lift finger, tap again to continue. Switch tools to stop.',
  trendline: 'Trendline — tap to place start, tap again for end. Drag either endpoint to adjust.',
  rect: 'Rectangle — tap to place first corner, tap again for opposite corner. Drag corners to resize.'
};

function toolbarHTML(csId, activeTool, color, strokeW) {
  const btns = ['path','trendline','rect'].map(t =>
    `<button class="stb ${t===activeTool?'on':''}" onclick="setCanvasTool('${csId}','${t}')" title="${t}">${TOOL_ICONS[t]}</button>`
  ).join('');
  return `${btns}
    <div class="stb-sep"></div>
    <input type="color" class="s-cpick" value="${color}" oninput="getCS('${csId}').color=this.value" title="Color">
    <select class="s-wsel" onchange="getCS('${csId}').strokeW=parseInt(this.value)">
      <option value="1" ${strokeW===1?'selected':''}>1px</option>
      <option value="2" ${strokeW===2?'selected':''}>2px</option>
      <option value="3" ${strokeW===3?'selected':''}>3px</option>
    </select>
    <div class="stb-sep"></div>
    <button class="stb" onclick="undoShape('${csId}')" title="Undo last shape"><svg viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M3 8h10a6 6 0 0 1 0 12H5"/><polyline points="3,4 3,8 7,8"/></svg></button>
    <button class="stb" onclick="clearCanvas('${csId}')" title="Clear all"><svg viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><polyline points="3,6 19,6"/><path d="M7 6V4h8v2M17 6l-1 13H6L5 6"/></svg></button>`;
}

function setCanvasTool(csId, t) {
  // if switching away from path mid-draw, finish it
  if (drawState && drawState.csId === csId && drawState.tool === 'path') finishPath(csId);
  if (drawState && drawState.csId === csId) drawState = null;
  getCS(csId).tool = t;
  // re-render toolbar hint and button states
  const tb = document.getElementById('tb-'+csId);
  if (tb) {
    const cs = getCS(csId);
    tb.innerHTML = toolbarHTML(csId, t, cs.color, cs.strokeW);
  }
  const hint = document.getElementById('hint-'+csId);
  if (hint) hint.textContent = TOOL_HINTS[t] || '';
}

// ─── MAIN SKETCH TAB ─────────────────────────────────────────────
function renderSketch(container, mode) {
  const csId = 'mainSketch-' + (sel ? sel.id : 0);
  const sketchData = mode === 'main' ? (sec === 'concepts' ? sel.concept_sketch : sel.sketch) : null;
  deserialiseCanvas(csId, sketchData);
  const cs = getCS(csId);
  container.innerHTML = `<div class="sketch-wrap">
    <div class="sketch-tb" id="tb-${csId}">${toolbarHTML(csId, cs.tool, cs.color, cs.strokeW)}</div>
    <svg class="draw-svg" id="${csId}" xmlns="http://www.w3.org/2000/svg"></svg>
    <div class="sketch-hint" id="hint-${csId}">${TOOL_HINTS[cs.tool]}</div>
  </div>`;
  const svgEl = document.getElementById(csId);
  drawGrid(svgEl, 'sk-grid', 40);
  renderCanvas(csId);
  attachCanvas(svgEl, csId);
}

// ─── RULES ───────────────────────────────────────────────────────
function renderRules(el){
  if(!sel.rules||!sel.rules.length)sel.rules=[{t:''},{t:''},{t:''}];
  el.innerHTML=`<div class="rules-panel">
    <div class="concept-card" style="background:var(--card)">
      <div class="field-label" style="margin-bottom:8px">About this rule set</div>
      <textarea class="rules-intro" style="width:100%;background:transparent;border:none;outline:none;color:var(--text2);font-size:13px;line-height:1.75;font-family:var(--sans);resize:none;min-height:40px" placeholder="What is the purpose of these rules? What behaviour are they enforcing?" oninput="sel.rules_intro=this.value">${esc(sel.rules_intro||'')}</textarea>
    </div>
    <div id="rulesList"></div>
    <button class="add-rule-btn" onclick="addRule()">
      <svg viewBox="0 0 12 12"><line x1="6" y1="1" x2="6" y2="11"/><line x1="1" y1="6" x2="11" y2="6"/></svg>
      Add rule
    </button>
  </div>`;
  renderRuleRows();
}
function renderRuleRows(){
  const el=document.getElementById('rulesList');if(!el)return;
  el.innerHTML=sel.rules.map((r,i)=>`
    <div class="rule-item">
      <div class="rule-num">${i+1}</div>
      <textarea class="rule-inp" rows="1" placeholder="Write rule ${i+1}…" oninput="sel.rules[${i}].t=this.value;autoResizeTA(this)" onfocus="autoResizeTA(this)">${esc(r.t||'')}</textarea>
      <button class="rule-rm" onclick="removeRule(${i})"><svg viewBox="0 0 14 14"><line x1="1" y1="1" x2="13" y2="13"/><line x1="13" y1="1" x2="1" y2="13"/></svg></button>
    </div>`).join('');
  setTimeout(()=>document.querySelectorAll('.rule-inp').forEach(t=>autoResizeTA(t)),0);
}
function autoResizeTA(el){el.style.height='auto';el.style.height=el.scrollHeight+'px'}
function addRule(){sel.rules.push({t:''});renderRuleRows();}
function removeRule(i){sel.rules.splice(i,1);renderRuleRows();}

// ─── EXAMPLES ────────────────────────────────────────────────────
function renderExamples(el){
  if(!sel.examples)sel.examples=[];
  el.innerHTML=`<div class="examples-panel">
    ${sel.examples.map((ex,i)=>renderExCard(ex,i)).join('')}
    <button class="add-ex-btn" onclick="addExample()">
      <svg viewBox="0 0 12 12"><line x1="6" y1="1" x2="6" y2="11"/><line x1="1" y1="6" x2="11" y2="6"/></svg>
      Add example
    </button>
  </div>`;
  sel.examples.forEach((ex,i)=>initExCanvas(ex,i));
}

function renderExCard(ex,i){
  const csId='exSketch-'+(sel?sel.id:0)+'-'+i;
  return`<div class="ex-card" id="excard-${i}">
    <div class="ex-card-head">
      <span class="ex-card-num">Example ${i+1}</span>
      <button class="ex-del" onclick="removeExample(${i})"><svg viewBox="0 0 14 14"><line x1="1" y1="1" x2="13" y2="13"/><line x1="13" y1="1" x2="1" y2="13"/></svg></button>
    </div>
    <div class="ex-body">
      <textarea class="ex-desc" rows="3" placeholder="Describe what happened — what you saw, why it qualified, how it played out…" oninput="sel.examples[${i}].desc=this.value">${esc(ex.desc||'')}</textarea>
      <div class="ex-sketch-area">
        <div class="ex-sketch-tb" id="tb-${csId}">${toolbarHTML(csId,'path','#3b6ef0',2)}</div>
        <svg class="ex-draw-svg" id="${csId}" xmlns="http://www.w3.org/2000/svg"></svg>
      </div>
    </div>
  </div>`;
}

function initExCanvas(ex,i){
  const csId='exSketch-'+(sel?sel.id:0)+'-'+i;
  const svgEl=document.getElementById(csId);if(!svgEl)return;
  deserialiseCanvas(csId, ex.sketch||null);
  drawGrid(svgEl,'ex-grid',32);
  renderCanvas(csId);
  attachCanvas(svgEl,csId);
}

function addExample(){
  if(!sel.examples)sel.examples=[];
  sel.examples.push({desc:'',sketch:''});
  renderExamples(document.getElementById('docBody'));
}
function removeExample(i){
  if(!confirm('Remove this example?'))return;
  sel.examples.splice(i,1);
  renderExamples(document.getElementById('docBody'));
}

// ─── SAVE ────────────────────────────────────────────────────────
async function saveEntry(){
  if(!sel)return;
  const ct=activeDocTab[sec];
  // capture main sketch
  if(ct==='sketch'){
    const csId='mainSketch-'+sel.id;
    if(sec==='concepts')sel.concept_sketch=serialiseCanvas(csId);
    else sel.sketch=serialiseCanvas(csId);
  }
  // capture all example sketches regardless of active tab
  if(sel.examples){
    sel.examples.forEach((ex,i)=>{
      const csId='exSketch-'+sel.id+'-'+i;
      if(canvasState[csId])ex.sketch=serialiseCanvas(csId);
    });
  }
  const idx=store[sec].findIndex(x=>x.id===sel.id);
  if(idx>=0)store[sec][idx]=sel;
  await persist();
  renderList();
  toast('Saved');
}

// Service worker for offline
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}

init();
</script>
